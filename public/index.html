<title>Tu Polla </title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%22100%2080%20350%20420%22%3E%3Cstyle%3E.f1%7Bfill%3A%23de3d27%7D.f2%7Bfill%3A%23f5a522%7D.f4%7Bfill%3A%231e3dad%7D%3C%2Fstyle%3E%3Cpath%20class%3D%22f1%22%20d%3D%22m154.9%2C266.07l-6.52-6.6c-22.56-22.84-23.47-50.61-6.91-66.97h0s14.12%2C14.3%2C14.12%2C14.3l-.43-.86c-16.19-32.25-4.25-63.91%2C23.17-77.67h0l24.09%2C48.01c6.48-12.55%2C18.19-21.49%2C32.79-24.76l11.57%2C51.73c-37.52%2C4.84-76.56%2C25.56-91.9%2C62.82Z%22%2F%3E%3Cpath%20class%3D%22f2%22%20d%3D%22m407.52%2C300.09c-11.28-50.51-65.88-82.19-126.37-76.08v109.42c39.02-.08%2C77.74-6.99%2C114.34-20.56l13.74-5.09-1.72-7.69Z%22%2F%3E%3Cpath%20class%3D%22f1%22%20d%3D%22m281.15%2C333.49h59.55c32.87%2C0%2C59.55%2C26.68%2C59.55%2C59.55h0c0%2C32.87-26.68%2C59.55-59.55%2C59.55h0c-32.87%2C0-59.55-26.68-59.55-59.55v-59.55h0Z%22%2F%3E%3Cpath%20class%3D%22f4%22%20d%3D%22m308.24%2C262.14l28.15%2C19.55s9.6-35.71%2C42.46-29.18c0%2C0-18.95-16.56-35.04-20.77%2C0%2C0-16.29-1.23-35.57%2C30.41Z%22%2F%3E%3C%2Fsvg%3E"/>
<script defer src="/_vercel/insights/script.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#F7F7F7;
 --surface:#FFFFFF;
 --surface-2:#F0F0F0;
 --surface-3:#E5E5E5;
 --border:#E5E5E5;
 --border-soft:#EBEBEB;
 --border-strong:#CACACA;
 --text:#3C3C3C;
 --text-muted:#777777;
 --text-dim:#AFAFAF;
 --primary:#FF9600;
 --primary-hover:#E68600;
 --primary-dark:#CC7700;
 --primary-soft:#FFF3D4;
 --secondary:#1CB0F6;
 --secondary-light:#46C6FF;
 --secondary-soft:#DFF4FF;
 --accent:#CE82FF;
 --accent-light:#A560E8;
 --accent-soft:#F4E4FF;
 --success:#58CC02;
 --success-text:#3D9100;
 --danger:#FF4B4B;
 --danger-soft:#FFD5D5;
 --danger-text:#CC0000;
 --warning:#FF9600;
 --warning-soft:#FFF3D4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Nunito',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;position:relative}
.app{max-width:680px;margin:0 auto;padding-bottom:80px;position:relative;z-index:1}

/* ── HEADER ── */
.header{position:relative;padding:20px 16px 0;text-align:center;overflow:hidden;background:var(--surface);border-radius:20px;margin:8px 8px 4px;border:2px solid var(--border);box-shadow:0 4px 0 var(--border-strong)}
.header::before{display:none}
.header-bg{display:none}
.header h1{position:relative;font-size:22px;font-weight:900;letter-spacing:-0.3px;margin:6px 0 2px;text-transform:uppercase;font-family:'Nunito',sans-serif;color:var(--text)}
.header-sub{position:relative;color:var(--text-muted);font-size:11px;margin-bottom:4px;font-family:'Nunito',sans-serif;font-weight:700}
.countdown-bar{position:relative;background:var(--primary-soft);border-radius:20px;padding:6px 14px;margin:8px 0;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--primary-dark);border:2px solid var(--primary);font-family:'Nunito',sans-serif}
.tabs-wrap{position:relative;display:flex;justify-content:center}
.tabs-wrap::after{content:"";position:absolute;right:0;top:0;bottom:0;width:30px;background:linear-gradient(to right,transparent,var(--surface));pointer-events:none;z-index:2}
.tabs{display:flex;overflow-x:auto;gap:5px;scrollbar-width:none;position:relative;justify-content:center;flex-wrap:nowrap;width:100%;padding:8px 6px 6px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:7px 14px;font-size:11px;font-weight:800;border:2px solid transparent;border-radius:20px;cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;transition:all .15s}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary-dark);box-shadow:0 3px 0 var(--primary-dark)}
.tab:not(.active){background:var(--surface-2);color:var(--text-muted);border-color:var(--border)}

/* ── CONTENT ── */
.content{padding:16px 12px}
.card{background:var(--surface);border-radius:18px;padding:16px;margin-bottom:12px;border:2px solid var(--border);box-shadow:0 4px 0 var(--border-strong)}
.match-card{background:var(--surface);border-radius:18px;padding:12px;margin-bottom:10px;position:relative;border:2px solid var(--border);box-shadow:0 4px 0 var(--border-strong)}
.match-meta{font-size:11px;color:var(--text-muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-weight:700}
.match-teams{display:flex;align-items:center;gap:8px}
.team{flex:1;font-weight:800;font-size:13px}
.team.home{text-align:right}
.score-input{width:40px;text-align:center;background:var(--surface-2);border:2px solid var(--border);border-radius:12px;color:var(--text);padding:6px;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif}
.score-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.score-sep{color:var(--text-muted);font-weight:800;flex-shrink:0}
.group-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill{padding:6px 14px;border-radius:20px;border:2px solid var(--border);cursor:pointer;font-size:12px;font-weight:800;transition:all .15s;box-shadow:0 3px 0 var(--border-strong);font-family:'Nunito',sans-serif}
.rank-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:2px solid var(--border-soft)}
.rank-row:last-child{border-bottom:none}

/* ── LOGIN ── */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;background:transparent}
.login-screen h1{font-size:28px;font-weight:900;margin:12px 0 4px;font-family:'Nunito',sans-serif;letter-spacing:-0.3px}
.input{width:100%;max-width:340px;background:var(--surface);border:2px solid var(--border);border-radius:16px;color:var(--text);padding:14px 18px;font-size:16px;margin-bottom:12px;outline:none;font-family:'Nunito',sans-serif;font-weight:700;transition:border-color .15s}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.btn{width:100%;max-width:340px;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:16px;padding:15px;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .1s;letter-spacing:0.2px}
.btn:hover{background:var(--primary-hover)}
.btn:active{border-bottom-width:0;transform:translateY(4px)}
.btn:disabled{background:var(--surface-3);color:var(--text-dim);cursor:not-allowed;border-bottom-color:var(--border-strong)}
.btn-secondary{width:100%;max-width:340px;background:var(--surface);color:var(--text-muted);border:2px solid var(--border);border-bottom:4px solid var(--border-strong);border-radius:16px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:10px;transition:all .1s}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-secondary:active{border-bottom-width:0;transform:translateY(4px)}
.link-btn{background:none;border:none;color:var(--primary);cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;text-decoration:underline;padding:0;font-weight:800}
.remember-row{display:flex;align-items:center;gap:8px;max-width:340px;width:100%;margin-bottom:12px;cursor:pointer}
.remember-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);cursor:pointer}
.remember-row span{font-size:13px;color:var(--text-muted);font-family:'Nunito',sans-serif;font-weight:700}
.error{color:var(--danger);font-size:13px;margin-bottom:10px;max-width:340px;font-weight:800}
.lock-badge{font-size:10px;background:var(--surface-2);color:var(--text-muted);padding:3px 8px;border-radius:20px;margin-left:4px;border:2px solid var(--border);font-weight:800}
.admin-badge{background:var(--secondary);color:#ffffff;font-size:10px;padding:3px 10px;border-radius:20px;margin-left:8px;font-weight:800}

/* ── TOAST ── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--success);color:#ffffff;padding:12px 22px 12px 18px;border-radius:20px;font-weight:800;font-size:14px;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 0 rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;max-width:90vw;overflow:hidden;text-overflow:ellipsis;border:2px solid rgba(255,255,255,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spinner{text-align:center;padding:60px;color:var(--text-muted);font-size:14px;font-weight:700}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}

/* ── SCORES ── */
.score-box{background:var(--surface-2);padding:5px 10px;border-radius:12px;font-size:14px;font-weight:800;min-width:30px;text-align:center;border:2px solid var(--border)}
.score-box.pred{color:var(--text-muted)}
.score-box.result{color:var(--success-text);border-color:var(--success);background:rgba(88,204,2,.1)}
.vs-scores{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:90px}
.pred-row{display:flex;align-items:center;gap:4px}
.pts-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap;border:2px solid transparent}
.pts-3{background:rgba(34,197,94,0.18);color:var(--success-text)}
.pts-1{background:var(--warning-soft);color:var(--warning)}
.pts-2{background:var(--warning-soft);color:var(--warning)}
.pts-0{background:var(--danger-soft);color:var(--danger-text)}

/* ── LIVE PULSE ── */
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block;margin-right:4px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ── DRAG & DROP ── */
.sortable-list{list-style:none}
.sortable-item{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:16px;padding:12px 14px;margin-bottom:8px;cursor:grab;border:2px solid var(--border);box-shadow:0 3px 0 var(--border-strong);transition:border-color .2s;user-select:none;touch-action:none}
.sortable-item.dragging{opacity:.4;cursor:grabbing}
.sortable-item.drag-over{border-color:var(--primary)}
.pos-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;color:#ffffff}

/* ── ELIM ── */
.elim-locked-info{background:var(--surface);border-radius:18px;padding:24px;text-align:center;color:var(--text-muted);font-size:13px;font-weight:700;border:2px dashed var(--border);margin-bottom:10px}

/* ── RANKING PODIO ── */
.podio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;align-items:end}
.podio-card{border-radius:20px;padding:14px 8px;text-align:center;border:2px solid var(--border);box-shadow:0 4px 0 var(--border-strong)}
.podio-card.p1{background:var(--primary-soft);border-color:var(--primary);box-shadow:0 4px 0 var(--primary-dark);order:2}
.podio-card.p2{background:var(--surface);order:1}
.podio-card.p3{background:var(--surface);order:3}
.podio-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;margin:0 auto 6px}
.podio-medal{font-size:20px;margin-bottom:4px}
.podio-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.podio-pts{font-size:18px;font-weight:900}
@keyframes podioIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.podio-card{animation:podioIn .4s ease both}
.podio-card.p1{animation-delay:.1s}
.podio-card.p2{animation-delay:0s}
.podio-card.p3{animation-delay:.2s}

/* ── FABS ── */
.fab{position:fixed;bottom:20px;width:44px;height:44px;border-radius:50%;color:var(--text-muted);border:2px solid var(--border);border-bottom:4px solid var(--border-strong);font-size:18px;cursor:pointer;z-index:900;display:flex;align-items:center;justify-content:center;background:var(--surface)}
.fab:hover{background:var(--surface-3);color:var(--text);border-color:var(--primary)}
.fab-right{right:20px}
.fab-left{left:20px}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--surface);border-radius:24px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;padding:24px;border:2px solid var(--border);box-shadow:0 6px 0 var(--border-strong)}
.modal-box h2{font-size:18px;font-weight:900;margin-bottom:16px;text-align:center;font-family:'Nunito',sans-serif}
.rules-section{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border-soft)}
.rules-section:last-of-type{border-bottom:none}
.rules-section h3{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:6px;letter-spacing:.5px}
.rules-section p,.rules-section li{font-size:13px;color:var(--text-muted);line-height:1.65;margin-bottom:3px}
.rules-section ul{padding-left:16px}
.modal-close{width:100%;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:16px;padding:13px;font-size:15px;font-weight:900;cursor:pointer;margin-top:12px;font-family:'Nunito',sans-serif;transition:all .1s}.modal-close:active{border-bottom-width:0;transform:translateY(4px)}

/* ── CARTA CAMPEÓN ── */
.carta-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
.carta-box{background:var(--surface);border-radius:24px;max-width:420px;width:100%;padding:28px 22px 24px;border:3px solid var(--primary);box-shadow:0 6px 0 var(--primary-dark);text-align:center}
.carta-trophy{font-size:52px;margin-bottom:8px;display:block;animation:bounce .8s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}
@keyframes bounce2{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.carta-crown{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px}
.carta-name{font-size:24px;font-weight:900;color:var(--text);margin-bottom:12px}
.carta-divider{border:none;border-top:1px solid var(--border-soft);margin:14px 0}
.carta-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--primary);text-transform:uppercase;margin-bottom:10px}
.carta-text{font-size:13px;color:var(--text);line-height:1.8;text-align:left}
.carta-text p{margin-bottom:10px}
.carta-text p:last-child{margin-bottom:0}
.carta-firma{margin-top:14px;text-align:right;font-size:11px;color:var(--text-muted);font-style:italic}
.carta-close{margin-top:18px;width:100%;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:16px;padding:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .1s}.carta-close:active{border-bottom-width:0;transform:translateY(4px)}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 280px);min-height:280px}
.chat-messages{flex:1;overflow-y:auto;padding:4px 0 8px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.chat-msg{display:flex;flex-direction:column;max-width:82%;gap:2px}
.chat-msg.mine{align-self:flex-end;align-items:flex-end}
.chat-msg.theirs{align-self:flex-start;align-items:flex-start}
.chat-bubble{padding:9px 14px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word;font-weight:700}
.chat-msg.mine .chat-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px;border:2px solid var(--primary-dark)}
.chat-msg.theirs .chat-bubble{background:var(--surface-2);color:var(--text);border-bottom-left-radius:4px;border:2px solid var(--border)}
.chat-meta{font-size:10px;color:var(--text-dim);padding:0 4px}
.chat-input-row{display:flex;gap:8px;padding:10px 0 0;border-top:1px solid var(--border-soft);margin-top:6px}
.chat-input{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:16px;color:var(--text);padding:10px 14px;font-size:14px;outline:none;font-family:'Nunito',sans-serif;font-weight:700;resize:none;min-height:44px;max-height:80px}
.chat-input:focus{border-color:var(--primary)}
.chat-send{background:var(--primary);color:#fff;border:none;border-bottom:3px solid var(--primary-dark);border-radius:16px;padding:10px 16px;font-size:18px;cursor:pointer;flex-shrink:0;line-height:1;transition:all .1s}
.chat-send:hover{background:var(--primary-hover)}
.chat-send:active{border-bottom-width:0;transform:translateY(3px)}
.chat-empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px}

/* ── H2H HISTORY ── */
.h2h-block{padding:8px 0 2px;border-top:1px solid var(--border-soft);margin-top:8px}
.h2h-title{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.h2h-rows{display:none}
.h2h-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-muted);padding:4px 0;border-bottom:1px solid var(--border-soft)}
.h2h-row:last-child{border-bottom:none}
.h2h-score{font-weight:700;color:var(--text);font-size:12px}
.h2h-comp{font-size:10px;color:var(--text-dim);text-align:right;min-width:64px}

/* ── HISTORIAL ── */
.hist-chart{padding:8px 0}
.hist-line{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hist-label{font-size:11px;color:var(--text-muted);width:60px;text-align:right;flex-shrink:0}
.hist-bar-wrap{flex:1;background:var(--surface-2);border-radius:4px;height:20px;position:relative;overflow:hidden}
.hist-bar{height:100%;border-radius:4px;background:var(--primary);transition:width .4s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:24px}
.hist-bar-val{font-size:10px;font-weight:700;color:#ffffff}
.hist-pos{font-size:11px;font-weight:700;width:20px;flex-shrink:0}
@media(hover:none)and(pointer:coarse){.polla-dots-btn{display:none!important}}
@media(max-width:768px){.polla-dots-btn{display:none!important}}

/* ── REACTIONS ── */
.reaction-float{position:fixed;background:var(--surface);border:1px solid var(--border-soft);border-radius:16px;padding:6px 10px;display:flex;gap:6px;z-index:2000;box-shadow:0 8px 32px rgba(0,0,0,.7);animation:popIn .15s ease}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.reaction-btn{font-size:22px;background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:10px;transition:transform .12s;line-height:1}
.reaction-btn:hover,.reaction-btn:active{transform:scale(1.35);background:var(--surface-3)}
.pred-reaction-badge{font-size:12px;display:inline-flex;align-items:center;gap:2px;background:var(--surface-3);border:1px solid var(--border-soft);border-radius:8px;padding:1px 5px;cursor:default}

/* ── BRACKET VERTICAL ── */
.bracket-outer{padding:4px 0 8px}
.bracket-section{margin-bottom:20px}
.bracket-phase-hdr{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--primary);text-transform:uppercase;padding:4px 0 10px;border-bottom:1px solid var(--border-soft);margin-bottom:10px}
.bracket-match{background:var(--surface);border:2px solid var(--border);border-radius:18px;margin-bottom:10px;overflow:hidden;transition:border-color .15s,box-shadow .15s;position:relative;box-shadow:0 4px 0 var(--border-strong)}
.bracket-match:not(.locked):hover{border-color:var(--primary);box-shadow:0 4px 0 var(--primary-dark);cursor:pointer}
.bracket-match.locked{cursor:default}
.bm-team{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:13px;font-weight:700;position:relative}
.bm-team.winner{background:rgba(34,197,94,.1);color:var(--success-text)}
.bm-team.loser{color:var(--text-dim)}
.bm-score{margin-left:auto;font-size:14px;font-weight:900;min-width:20px;text-align:right}
.bm-sep{height:1px;background:var(--border-soft);margin:0 12px}
.bm-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px}
.bm-meta{font-size:10px;color:var(--text-dim);padding:4px 12px 7px;display:flex;gap:8px}

/* ── COLLECTIVE BAR ── */
.coll-bar-wrap{margin-top:10px;padding:10px 12px;background:var(--surface-2);border-radius:14px;border:2px solid var(--border)}
.coll-bar-title{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coll-bar-row{display:flex;height:14px;border-radius:6px;overflow:hidden;margin-bottom:5px}
.coll-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;min-width:0;transition:width .3s}
.coll-legend{display:flex;gap:10px;flex-wrap:wrap}
.coll-leg-item{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:3px}
.coll-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

/* ── MISSING TOGGLE ── */
.missing-banner{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface-2);border-radius:8px;cursor:pointer;border:1px solid var(--border-soft);margin-bottom:12px;user-select:none}
.m-toggle{width:34px;height:20px;border-radius:10px;position:relative;flex-shrink:0;transition:background .2s}
.m-toggle::after{content:"";position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s}
.m-toggle.on{background:var(--primary)}
.m-toggle.on::after{transform:translateX(14px)}
.m-toggle.off{background:var(--border)}

/* ── AUTOCOMPLETE ── */
.autocomplete-wrap{position:relative;flex:1}
.autocomplete-input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:14px;outline:none;font-family:'Nunito',sans-serif}
.autocomplete-input:focus{border-color:var(--primary)}
.autocomplete-drop{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border-soft);border-radius:8px;z-index:500;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);margin-top:2px}
.autocomplete-item{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border-soft)}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover,.autocomplete-item.focused{background:var(--surface-3)}

/* ── RANKING BREAKDOWN ── */
.breakdown-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1100;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.breakdown-sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:680px;margin:0 auto;max-height:82vh;overflow-y:auto;padding:20px 16px 36px;border-top:3px solid var(--border);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.breakdown-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.rb-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border-soft)}
.rb-row:last-child{border-bottom:none}
.rb-label{font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.rb-val{font-size:16px;font-weight:900;color:var(--text)}
.rb-total{font-size:20px;font-weight:900;color:var(--primary)}

/* ── BRAND LOGO ── */
.brand-logo{display:inline-flex;align-items:flex-end;gap:6px;line-height:1;color:var(--primary);user-select:none}
.brand-tu{font-family:'Nunito',sans-serif;font-size:36px;color:var(--primary);font-weight:900;display:inline-block;margin-right:2px;margin-bottom:-4px}
.brand-polla{font-family:'Nunito',sans-serif;font-size:26px;color:var(--primary);letter-spacing:-0.5px;text-transform:uppercase;font-weight:900}
.brand-trophy{width:22px;height:28px;color:var(--primary);flex-shrink:0;margin-bottom:1px;filter:drop-shadow(1px 1px 0 var(--secondary))}
.brand-logo.lg .brand-tu{font-size:54px;margin-bottom:-6px}
.brand-logo.lg .brand-polla{font-size:40px}
.brand-logo.lg .brand-trophy{width:32px;height:40px}
.brand-logo.sm .brand-tu{font-size:22px;margin-bottom:-2px}
.brand-logo.sm .brand-polla{font-size:16px;text-shadow:1px 1px 0 var(--secondary)}
.brand-logo.sm .brand-trophy{width:14px;height:18px}

/* ── TRIVIA ── */
.tv-day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.tv-cell{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid var(--border);box-shadow:0 3px 0 var(--border-strong);transition:transform .1s;user-select:none}
.tv-cell.tv-done{background:#dcfce7;border-color:var(--success);box-shadow:0 3px 0 var(--success-text);cursor:pointer}
.tv-cell.tv-done:active,.tv-cell.tv-today-done:active{transform:translateY(2px);box-shadow:none}
.tv-cell.tv-today{background:var(--primary);border-color:var(--primary-dark);box-shadow:0 3px 0 var(--primary-dark);cursor:pointer;animation:tvPulse 2.2s ease-in-out infinite}
.tv-cell.tv-today:active{transform:translateY(2px);box-shadow:none}
.tv-cell.tv-locked{background:var(--surface-2);opacity:.5;cursor:not-allowed}
.tv-cell.tv-today-done{background:#dcfce7;border-color:var(--success);box-shadow:0 3px 0 var(--success-text);cursor:pointer}
@keyframes tvPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.tv-num{font-size:13px;font-weight:900;color:var(--text)}
.tv-cell.tv-today .tv-num{color:#fff}
.tv-cell.tv-locked .tv-num{color:var(--text-dim)}
.tv-score{font-size:8px;font-weight:800;color:var(--success-text);line-height:1.1}
.tv-cell.tv-today .tv-score,.tv-cell.tv-today-done .tv-score{color:rgba(255,255,255,.9)}
.tv-icon{font-size:9px;line-height:1}
.tv-back{background:var(--surface-2);border:2px solid var(--border);border-bottom:3px solid var(--border-strong);border-radius:10px;padding:6px 12px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--text-muted);flex-shrink:0;transition:all .1s}
.tv-back:hover{border-color:var(--primary);color:var(--primary)}
.tv-back:active{border-bottom-width:0;transform:translateY(2px)}
.tv-pbar{height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.tv-pbar-fill{height:100%;background:linear-gradient(90deg,var(--primary),#ffb833);border-radius:4px;transition:width .35s ease}
.tv-dots{display:flex;gap:5px;justify-content:center;margin-bottom:16px}
.tv-dot{width:9px;height:9px;border-radius:50%;background:var(--surface-3);border:2px solid var(--border);transition:all .2s}
.tv-dot.active{background:var(--primary);border-color:var(--primary-dark);transform:scale(1.25)}
.tv-dot.correct{background:var(--success);border-color:var(--success-text)}
.tv-dot.wrong{background:var(--danger);border-color:var(--danger-text)}
.tv-q{font-size:17px;font-weight:800;color:var(--text);text-align:center;line-height:1.45;margin-bottom:20px}
.tv-opts{display:flex;flex-direction:column;gap:9px}
.tv-opt{width:100%;background:var(--surface);color:var(--text);border:2px solid var(--border);border-bottom:4px solid var(--border-strong);border-radius:14px;padding:13px 15px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;text-align:left;display:flex;align-items:center;gap:10px;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.tv-opt:hover:not(:disabled){border-color:var(--primary)}
.tv-opt:disabled{cursor:default}
.tv-opt.correct{background:#dcfce7;border-color:var(--success);border-bottom-color:var(--success-text);color:var(--success-text)}
.tv-opt.wrong{background:var(--danger-soft);border-color:var(--danger);border-bottom-color:var(--danger-text);color:var(--danger-text)}
.tv-opt.faded:disabled{opacity:.4}
.tv-letter{width:26px;height:26px;border-radius:50%;background:var(--surface-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;transition:all .15s}
.tv-opt.correct .tv-letter{background:var(--success);border-color:var(--success-text);color:#fff}
.tv-opt.wrong .tv-letter{background:var(--danger);border-color:var(--danger-text);color:#fff}
.tv-fb{border-radius:14px;padding:12px 14px;margin-top:12px;display:none;align-items:center;gap:10px;animation:tvFbIn .2s ease}
@keyframes tvFbIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.tv-fb.show{display:flex}
.tv-fb.c{background:#dcfce7;border:2px solid var(--success)}
.tv-fb.w{background:var(--danger-soft);border:2px solid var(--danger)}
.tv-fb-icon{font-size:22px;flex-shrink:0}
.tv-fb-msg{font-size:13px;font-weight:700}
.tv-fb-msg.c{color:var(--success-text)}
.tv-fb-msg.w{color:var(--danger-text)}
.tv-next{width:100%;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:14px;padding:13px;font-size:15px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:12px;transition:all .1s;display:none}
.tv-next.show{display:block}
.tv-next:active{border-bottom-width:0;transform:translateY(4px)}
.tv-rrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:2px solid var(--border-soft)}
.tv-rrow:last-child{border-bottom:none}
.tv-rq{flex:1;font-size:12px;font-weight:700;color:var(--text-muted);line-height:1.35;padding-right:6px}
.tv-rbadge{font-size:11px;font-weight:800;padding:3px 8px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.tv-rbadge.c{background:#dcfce7;color:var(--success-text)}
.tv-rbadge.w{background:var(--danger-soft);color:var(--danger-text)}
.tv-rev-q{margin-bottom:12px;padding-bottom:12px;border-bottom:2px solid var(--border-soft)}
.tv-rev-q:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.tv-rev-qtext{font-size:13px;font-weight:800;color:var(--text);margin-bottom:6px;line-height:1.4}
.tv-rev-opt{font-size:12px;font-weight:700;padding:7px 10px;border-radius:10px;border:2px solid transparent;display:flex;align-items:center;gap:7px;margin-bottom:4px}
.tv-rev-opt.c{background:#dcfce7;border-color:var(--success);color:var(--success-text)}
.tv-rev-opt.w{background:var(--danger-soft);border-color:var(--danger);color:var(--danger-text)}
.tv-rev-opt.ca{background:#dcfce7;border-color:var(--success);color:var(--success-text);opacity:.65}
.tv-rev-opt.n{color:var(--text-dim);background:var(--surface-2);border-color:var(--border)}
.tv-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.tv-stat{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:10px 6px;text-align:center;box-shadow:0 3px 0 var(--border-strong)}
.tv-stat-n{font-size:22px;font-weight:900;color:var(--primary)}
.tv-stat-l{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

function calcMatchPoints(pred,res){
 if(!pred||!res)return null;
 const ph=parseInt(pred.h),pa=parseInt(pred.a),rh=parseInt(res.h),ra=parseInt(res.a);
 if(isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra))return null;
 if(res.h===""||res.a==="")return null;
 if(ph===rh&&pa===ra)return 3;
 if(Math.sign(ph-pa)===Math.sign(rh-ra)&&(ph-pa)===(rh-ra))return 2;
 if(Math.sign(ph-pa)===Math.sign(rh-ra))return 1;
 return 0;
}
function calcElimPoints(pred,res){
 if(!pred||!res||!res.winner)return null;
 const ph=parseInt(pred.h),pa=parseInt(pred.a),rh=parseInt(res.h),ra=parseInt(res.a);
 const exactScore=!isNaN(ph)&&!isNaN(pa)&&!isNaN(rh)&&!isNaN(ra)&&ph===rh&&pa===ra;
 if(exactScore&&pred.winner===res.winner)return 3;
 if(exactScore&&pred.winner&&pred.winner!==res.winner)return 2;
 if(pred.winner&&pred.winner===res.winner)return 1;
 if(pred.winner)return 0;
 return null;
}
function calcGroupPredPoints(userOrder,realOrder){
 if(!userOrder||!realOrder)return 0;
 let pts=0;
 for(let i=0;i<4;i++){if(userOrder[i]&&realOrder[i]&&userOrder[i]===realOrder[i])pts+=2;}
 return pts;
}

function calcMatchPointsR(pred,res,r){

   entries.forEach(e=>{

window.doJoinFromLanding=async function(){
 const code=(document.getElementById("landingCode").value||"").trim().toUpperCase();
 const errEl=document.getElementById("landingError");
 if(code.length<4){errEl.textContent="Escribe el código completo.";return;}
 errEl.textContent="";
 const inp=document.getElementById("landingCode");
 inp.disabled=true;
 try{
 const snap=await db.ref("pollas").orderByChild("code").equalTo(code).get();
 if(!snap.exists()){errEl.textContent="Código no encontrado. Verifica e intenta de nuevo.";inp.disabled=false;return;}
 if(currentUser){await joinPollaByCode(code);return;}
 renderPickName(
 async(name)=>{pendingName=name;pendingPollaAction=async()=>{await joinPollaByCode(code);};renderAuthScreen(name);},
 ()=>renderLanding()
 );
 }catch(e){errEl.textContent="Error al conectar. Intenta de nuevo.";inp.disabled=false;}
};

let _pickNameCallback=null;
let _pickNameBack=null;
function renderPickName(onDone, onBack){
 setFabs(false);
 _pickNameCallback=onDone;
 _pickNameBack=onBack||null;
 const savedName=pendingName||"";
 document.getElementById("root").innerHTML=`
 <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center;position:relative;z-index:1">
 <div style="font-size:52px;margin-bottom:16px"></div>

 <div style="font-size:13px;color:var(--text-dim);margin-bottom:28px">Puedes cambiarlo después cuando quieras</div>
 <input id="pickNameInput" type="text" placeholder="Tu nombre en la polla"
 maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false"
 value="${savedName}"
 style="width:100%;max-width:340px;background:var(--surface);border:2px solid var(--primary);border-radius:14px;color:var(--text);padding:16px 18px;font-size:22px;font-weight:700;font-family:'Nunito',sans-serif;outline:none;box-sizing:border-box;text-align:center;margin-bottom:10px"
 onkeydown="if(event.key==='Enter')doPickName()"

 />

 <button id="pickNameBtn" onclick="doPickName()" style="width:100%;max-width:340px;background:var(--primary);color:#ffffff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif">

 <button onclick="_pickNameBack?_pickNameBack():renderLanding()" style="background:none;border:none;color:var(--border);font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:16px">← Volver</button>
 </div>`;
 setTimeout(()=>{const el=document.getElementById("pickNameInput");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},100);
}

window.doPickName=async function(){
 const n=(document.getElementById("pickNameInput").value||"").trim();
 const errEl=document.getElementById("pickNameError"),btn=document.getElementById("pickNameBtn");
 if(!n||n.length<2){errEl.textContent="Mínimo 2 caracteres.";return;}
 btn.disabled=true;btn.textContent="Continuar →";
 if(_pickNameCallback)await _pickNameCallback(n);
 btn.disabled=false;
};

window.doEmailAuth=async function(){
 const email=(document.getElementById("authEmail").value||"").trim();
 const pass=document.getElementById("authPass").value||"";
 const errEl=document.getElementById("authError"),btn=document.getElementById("authBtn");
 if(!email||!email.includes("@")){errEl.textContent="Escribe un email válido.";return;}
 if(pass.length<6){errEl.textContent="La contraseña debe tener al menos 6 caracteres.";return;}
 btn.disabled=true;btn.textContent="Entrando...";
 try{
 // First try sign in
 try{await auth.signInWithEmailAndPassword(email,pass);}
 catch(le){
 // If account doesn't exist or credentials invalid, try creating account
 const shouldTryCreate=[
 "auth/user-not-found",
 "auth/invalid-credential",
 "auth/invalid-login-credentials"
 ].includes(le.code);
 if(shouldTryCreate){
 try{
 await auth.createUserWithEmailAndPassword(email,pass);
 }catch(ce){
 // If create fails with email-already-in-use, the password was just wrong
 if(ce.code==="auth/email-already-in-use"){
 errEl.textContent="Contraseña incorrecta.";
 btn.disabled=false;btn.textContent="Entrar →";
 return;
 }
 throw ce;
 }
 }else{throw le;}
 }
 }catch(e){
 const msg={
 "auth/wrong-password":"Contraseña incorrecta.",
 "auth/invalid-credential":"Contraseña incorrecta.",
 "auth/invalid-login-credentials":"Contraseña incorrecta.",
 "auth/user-not-found":"Correo electrónico no registrado.",
 "auth/invalid-email":"El correo electrónico no es válido.",
 "auth/too-many-requests":"Demasiados intentos fallidos. Espera unos minutos.",
 "auth/network-request-failed":"Sin conexión. Verifica tu red.",
 "auth/email-already-in-use":"Ese correo ya está registrado.",
 "auth/user-disabled":"Esta cuenta ha sido deshabilitada."
 }[e.code]||`Error al iniciar sesión (${e.code}).`;
 errEl.textContent=msg;btn.disabled=false;btn.textContent="Entrar →";
 }
};

function showGoalNotif(match,newH,newA){
 const pred=myPredictions[match.id];
 const hasPred=pred&&pred.h!==undefined&&pred.h!==""&&pred.a!==undefined&&pred.a!=="";

 // calc points with new score
 const pts=hasPred?calcMatchPoints(pred,{h:String(newH),a:String(newA)}):null;
 const isExact=pts===3;

 const bar=document.getElementById("goal-notif");
 const home=match.home,away=match.away;
 document.getElementById("gn-icon").textContent=isExact?"":"";
 document.getElementById("gn-score").textContent=`${home} ${newH} — ${newA} ${away}`;

 const ptsEl=document.getElementById("gn-pts");
 if(hasPred){
 if(isExact){
 ptsEl.textContent=`¡Pronosticaste ${pred.h}-${pred.a} · 3 puntos asegurados!`;
 ptsEl.style.color="#4ade80";
 bar.style.background="#1a3a1a";
 bar.style.borderBottomColor="#22c55e66";
 // shake after slide in
 setTimeout(()=>{
 bar.style.transform="translateY(0) translateX(-4px)";
 setTimeout(()=>{bar.style.transform="translateY(0) translateX(4px)";
 setTimeout(()=>{bar.style.transform="translateY(0)";},80);},80);
 },380);
 } else {
 ptsEl.textContent=`Pronosticaste ${pred.h}-${pred.a} · ahora tendrías ${pts} pt${pts!==1?"s":""}`;
 ptsEl.style.color="var(--primary-hover)";
 bar.style.background="var(--bg)";
 bar.style.borderBottomColor="var(--primary)44";
 }
 } else {
 ptsEl.textContent="";
 bar.style.background="var(--bg)";
 bar.style.borderBottomColor="var(--primary)44";
 }

 clearTimeout(_gnTimer);
 bar.style.transform="translateY(-100%)";
 void bar.offsetWidth;
 bar.style.transform="translateY(0)";
 _gnTimer=setTimeout(()=>{bar.style.transform="translateY(-100%)";},isExact?5000:4000);
}

// ─── MASTER POLLING ───────────────────────────────────────
function iniciarMasterPolling(){
 // Escuchar scores globales en tiempo real — todos los clientes
 db.ref("liveScores").on("value",snap=>{
 const live=snap.val()||{};
 Object.entries(live).forEach(([id,score])=>{
 if(id==="_lastUpdated")return;
 const numId=parseInt(id);
 if(!allResults[numId])allResults[numId]={};
 allResults[numId].h=score.h;
 allResults[numId].a=score.a;
 });
 render();
 });

 // Solo un cliente hace polling a BallDontLie
 async function turnoMaster(){
 const masterRef=db.ref("pollingMaster");
 try{
 const snap=await masterRef.get();
 const master=snap.val();
 const now=Date.now();
 const sinMaster=!master||(now-master.lastSeen)>180000;
 const soyCandidato=sinMaster||master.uid===currentUser.uid;
 if(soyCandidato){
 await masterRef.set({uid:currentUser.uid,lastSeen:now});
 await fetchLiveResults();
 }
 }catch(e){console.log("Master check error:",e);}
 }

 turnoMaster();
 setInterval(turnoMaster,120000);
}

async function fetchLiveResults(){
 try{
 const res=await fetch("https://api.balldontlie.io/fifa/worldcup/v1/matches?seasons[]=2026&per_page=200",{headers:{Authorization:BALLDONTLIE_KEY}});
 const data=await res.json();
 if(!data.data)return;
 const updates={};
 for(const m of data.data){
 if(m.status!=="completed"&&m.status!=="in_progress")continue;
 if(m.home_score==null||m.away_score==null)continue;
 const match=MATCHES.find(x=>x.home.toLowerCase().includes((m.home_team?.name||"").toLowerCase().split(" ")[0]));
 if(!match)continue;
 const newH=m.home_score,newA=m.away_score;
 const prev=_prevScores[match.id];
 if(prev!==undefined&&(prev.h!==newH||prev.a!==newA)){
 showGoalNotif(match,newH,newA);
 }
 _prevScores[match.id]={h:newH,a:newA};
 updates[`liveScores/${match.id}`]={h:String(newH),a:String(newA)};
 }
 updates["liveScores/_lastUpdated"]=Date.now();
 if(Object.keys(updates).length>1)await db.ref().update(updates);
 }catch(e){console.log("API error:",e);}
}

function calcGroupTable(g){
 const teams=GROUPS[g],stats={};
 teams.forEach(t=>{stats[t]={pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0};});
 MATCHES.filter(m=>m.group===g).forEach(m=>{
 const res=allResults[m.id];if(!res||res.h===""||res.h===undefined)return;
 const rh=parseInt(res.h),ra=parseInt(res.a);if(isNaN(rh)||isNaN(ra))return;
 const h=m.home,a=m.away;if(!stats[h]||!stats[a])return;
 stats[h].pj++;stats[a].pj++;stats[h].gf+=rh;stats[h].gc+=ra;stats[a].gf+=ra;stats[a].gc+=rh;
 if(rh>ra){stats[h].pts+=3;stats[h].pg++;stats[a].pp++;}
 else if(rh<ra){stats[a].pts+=3;stats[a].pg++;stats[h].pp++;}
 else{stats[h].pts+=1;stats[a].pts+=1;stats[h].pe++;stats[a].pe++;}
 });
 return Object.entries(stats).map(([t,s])=>({team:t,...s,dif:s.gf-s.gc})).sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);
}

function initDragDrop(){
 const g=currentGroup;if(!GROUPS[g])return;
 const list=document.getElementById(`sortable-${g}`);if(!list)return;
 let dragEl=null,placeholder=null;

 function makePlaceholder(el){
  const ph=document.createElement('li');
  ph.className='sortable-item';
  ph.style.cssText=`height:${el.offsetHeight}px;background:var(--primary-soft);border:2px dashed var(--primary);opacity:0.6;pointer-events:none;border-radius:16px;`;
  return ph;
 }
 function updateBadges(){[...list.children].filter(c=>!c._isPlaceholder).forEach((item,i)=>{const b=item.querySelector('.pos-num');if(b){b.style.background=POS_COLORS[i];b.textContent=POS_LABELS[i];}});}
 function realItems(){return[...list.children].filter(c=>c!==placeholder);}
 function saveOrder(){saveGroupPred(g,realItems().map(li=>li.dataset.team));}

 list.addEventListener("dragstart",e=>{
  dragEl=e.target.closest(".sortable-item");
  if(!dragEl)return;
  placeholder=makePlaceholder(dragEl);
  placeholder._isPlaceholder=true;
  setTimeout(()=>{
   if(dragEl)dragEl.style.opacity="0.3";
   list.insertBefore(placeholder,dragEl.nextSibling);
  },0);
 });
 list.addEventListener("dragend",()=>{
  if(dragEl)dragEl.style.opacity="";
  if(placeholder&&placeholder.parentNode)placeholder.parentNode.removeChild(placeholder);
  placeholder=null;dragEl=null;
  updateBadges();saveOrder();
 });
 list.addEventListener("dragover",e=>{
  e.preventDefault();
  if(!dragEl||!placeholder)return;
  const over=e.target.closest(".sortable-item");
  if(!over||over===dragEl||over===placeholder)return;
  const rect=over.getBoundingClientRect();
  const insertAfter=e.clientY>rect.top+rect.height/2;
  list.insertBefore(placeholder,insertAfter?over.nextSibling:over);
  list.insertBefore(dragEl,placeholder);
  updateBadges();
 });
 list.addEventListener("drop",e=>{e.preventDefault();});

 // Touch drag with live preview
 let tEl=null,tClone=null,tTimer=null,tActive=false,tPh=null;
 list.addEventListener("touchstart",e=>{
  const item=e.target.closest(".sortable-item");
  if(!item)return;
  tEl=item;tActive=false;
  tTimer=setTimeout(()=>{
   tActive=true;
   document.body.style.overflow="hidden";
   if(navigator.vibrate)navigator.vibrate(40);
   tPh=makePlaceholder(tEl);
   tPh._isPlaceholder=true;
   list.insertBefore(tPh,tEl.nextSibling);
   tEl.style.opacity="0.3";
   tClone=tEl.cloneNode(true);
   tClone.style.cssText=`position:fixed;opacity:.85;pointer-events:none;z-index:999;width:${tEl.offsetWidth}px;background:var(--surface);border-radius:16px;padding:12px 14px;box-shadow:0 8px 24px rgba(0,0,0,0.35);border:2px solid var(--primary);transition:none;`;
   document.body.appendChild(tClone);
  },300);
 },{passive:true});
 list.addEventListener("touchmove",e=>{
  if(!tEl){clearTimeout(tTimer);return;}
  if(!tActive){clearTimeout(tTimer);tEl=null;return;}
  e.preventDefault();
  const t=e.touches[0];
  tClone.style.left=(t.clientX-tEl.offsetWidth/2)+"px";
  tClone.style.top=(t.clientY-30)+"px";
  const els=document.elementsFromPoint(t.clientX,t.clientY);
  const over=els.find(el=>el.classList?.contains("sortable-item")&&el!==tEl&&el!==tPh);
  if(over){
   const rect=over.getBoundingClientRect();
   const insertAfter=t.clientY>rect.top+rect.height/2;
   list.insertBefore(tPh,insertAfter?over.nextSibling:over);
   list.insertBefore(tEl,tPh);
   updateBadges();
  }
 },{passive:false});
 list.addEventListener("touchend",()=>{
  clearTimeout(tTimer);
  document.body.style.overflow="";
  if(tClone){tClone.remove();tClone=null;}
  if(tPh&&tPh.parentNode)tPh.parentNode.removeChild(tPh);
  tPh=null;
  if(tEl){tEl.style.opacity="";}
  if(tActive){updateBadges();saveOrder();}
  tEl=null;tActive=false;
 });
 list.addEventListener("touchcancel",()=>{
  clearTimeout(tTimer);
  document.body.style.overflow="";
  if(tClone){tClone.remove();tClone=null;}
  if(tPh&&tPh.parentNode)tPh.parentNode.removeChild(tPh);
  tPh=null;
  if(tEl)tEl.style.opacity="";
  tEl=null;tActive=false;
 });
}

// ─── H2H HISTORY ──────────────────────────────────────────
async function fetchH2H(home,away){
 const key=`${home}_${away}`;
 if(key in h2hCache)return h2hCache[key];
 try{
 const q=encodeURIComponent(`${home} ${away}`);
 const res=await fetch(`https://api.balldontlie.io/fifa/worldcup/v1/matches?per_page=10`,{headers:{Authorization:BALLDONTLIE_KEY}});
 if(!res.ok){h2hCache[key]=null;return null;}
 const data=await res.json();
 if(!data.data){h2hCache[key]=null;return null;}
 const hn=home.toLowerCase(),an=away.toLowerCase();
 const matches=data.data.filter(m=>{
 const ht=(m.home_team?.name||"").toLowerCase(),at=(m.away_team?.name||"").toLowerCase();
 return(ht.includes(hn.split(" ")[0])||hn.includes(ht.split(" ")[0]))&&
 (at.includes(an.split(" ")[0])||an.includes(at.split(" ")[0]));
 }).slice(0,3);
 h2hCache[key]=matches.length?matches:null;
 return h2hCache[key];
 }catch(e){h2hCache[key]=null;return null;}
}

function h2hHTML(matchId,home,away){
 const key=`${home}_${away}`;
 const matches=h2hCache[key];
 if(!matches||!matches.length)return"";
 const rows=matches.map(m=>{
 const ht=m.home_team?.name||home,at=m.away_team?.name||away;
 const hs=m.home_score??"-",as=m.away_score??"-";
 const date=m.date?new Date(m.date).toLocaleDateString([],{month:"short",year:"numeric"}):"";
 const comp=m.competition||"";
 return`<div class="h2h-row">
 <span style="min-width:52px;font-size:10px;color:var(--text-dim)">${date}</span>
 <span class="h2h-score">${ht} ${hs}–${as} ${at}</span>
 <span class="h2h-comp">${comp}</span>
 </div>`;
 }).join("");
 return`<div class="h2h-block">
 <div class="h2h-title" onclick="toggleH2H(${matchId},this)">
 <span>Últimos enfrentamientos</span>
 <span style="font-size:10px;color:var(--text-dim)">▼ ver</span>
 </div>
 <div class="h2h-rows" id="h2h-${matchId}">${rows}</div>
 </div>`;
}

window.toggleH2H=function(matchId,titleEl){
 const rows=document.getElementById(`h2h-${matchId}`);
 if(!rows)return;
 const open=rows.style.display==="block";
 rows.style.display=open?"none":"block";
 titleEl.querySelector("span:last-child").textContent=open?"▼ ver":"▲ ocultar";
};

// Prefetch h2h for all group matches in background
async function prefetchH2H(){
 for(const m of MATCHES.filter(x=>x.phase==="groups")){
 if(!(`${m.home}_${m.away}` in h2hCache))
 await fetchH2H(m.home,m.away);
 }
}

function collectiveBar(m){
 // Aggregate all users' predictions for this match
 const users=Object.values(allUsers);
 if(users.length<2)return"";
 let home=0,draw=0,away=0;
 users.forEach(u=>{
 const p=(u.predictions||{})[m.id];
 if(!p||p.h===undefined||p.h==="")return;
 const ph=parseInt(p.h),pa=parseInt(p.a);
 if(isNaN(ph)||isNaN(pa))return;
 if(ph>pa)home++;
 else if(ph===pa)draw++;
 else away++;
 });
 const total=home+draw+away;
 if(!total)return"";
 const pH=Math.round(home/total*100),pD=Math.round(draw/total*100),pA=100-pH-pD;
 return`<div class="coll-bar-wrap">
 <div class="coll-bar-title"> Pronóstico colectivo (${total} participante${total!==1?"s":""})</div>
 <div class="coll-bar-row">

 ${pD>0?`<div class="coll-seg" style="width:${pD}%;background:#71717a">${pD>=15?pD+"%":""}</div>`:""}

   onkeydown="scoreInputKey(event,${m.id},'a')"/>
 </div>`;
}
window.scoreInputKey=function(e,matchId,side){
 // Tab: home→away within same match; away→home of next unlocked match
 if(e.key==="Tab"){
  e.preventDefault();
  savePred(matchId,side,e.target.value);
  if(side==="h"){
   // Move to away input of same match
   const next=document.querySelector(`.score-input[data-match="${matchId}"][data-side="a"]`);
   if(next){next.focus();next.select();}
  }else{
   // Move to home input of next unlocked match
   const allInputs=[...document.querySelectorAll('.score-input[data-side="h"]')];
   const cur=allInputs.findIndex(inp=>parseInt(inp.dataset.match)===matchId);
   const next=allInputs[cur+1];
   if(next){next.focus();next.select();}
  }
 }
 // Enter: save current and jump to home input of next match
 if(e.key==="Enter"){
  e.preventDefault();
  savePred(matchId,side,e.target.value);
  const allH=[...document.querySelectorAll('.score-input[data-side="h"]')];
  const cur=allH.findIndex(inp=>parseInt(inp.dataset.match)===matchId);
  const next=allH[cur+1];
  if(next){next.focus();next.select();}
 }
};
function spectatorBlock(m, res){

 if(pts===3) return `<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:#166534;color:#4ade80">exacto</span>`;

 const matchReactions=allReactions[m.id]||{};

 const rows = others.map(([uid,user])=>{

 // Collect reactions for this predictor

 const rxnCounts={};
 Object.values(predRxns).forEach(e=>{rxnCounts[e]=(rxnCounts[e]||0)+1;});

 return `<div class="spectator-pred" data-match="${m.id}" data-uid="${uid}" style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);position:relative">

 </div>
 </div>`;
 }).filter(Boolean).join('');

 if(!rows) return '';
 return `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
 <div style="font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Pronósticos de todos <span style="font-size:9px;font-weight:400;color:var(--text-dim);text-transform:none;letter-spacing:0">(mantén presionado para reaccionar)</span></div>
 ${rows}
 </div>`;
}

let chatListener=null;
function renderChat(){
 return`<div class="chat-wrap">
 <div class="chat-messages" id="chat-messages"><div class="chat-empty">¡Abre la conversación!</div></div>
 <div class="chat-input-row">
 <textarea class="chat-input" id="chat-input" placeholder="Escribe algo..." maxlength="280" rows="1"
 onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
 oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
 <button class="chat-send" onclick="sendChat()">↑</button>
 </div>
 </div>`;
}

function initChat(){
 if(!currentPollaId)return;
 // Detach previous listener
 if(chatListener){
 db.ref(`pollas/${currentPollaId}/chat`).off("value",chatListener);
 chatListener=null;
 }
 chatListener=db.ref(`pollas/${currentPollaId}/chat`).limitToLast(80).on("value",snap=>{
 const el=document.getElementById("chat-messages");
 if(!el)return;
 const data=snap.val()||{};
 const msgs=Object.entries(data).sort((a,b)=>a[1].ts-b[1].ts);
 if(!msgs.length){el.innerHTML=`<div class="chat-empty">¡Abre la conversación!</div>`;return;}
 const atBottom=el.scrollHeight-el.scrollTop-el.clientHeight<60;
 el.innerHTML=msgs.map(([id,m])=>{
 const mine=m.uid===currentUser.uid;
 const time=new Date(m.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",hour12:false});
 return`<div class="chat-msg ${mine?"mine":"theirs"}">
 ${!mine?`<div class="chat-meta" style="color:${avatarColor(m.name)};font-weight:700">${m.name}</div>`:""}
 <div class="chat-bubble">${escHtml(m.text)}</div>
 <div class="chat-meta">${time}</div>
 </div>`;
 }).join("");
 if(atBottom||msgs[msgs.length-1]?.[1]?.uid===currentUser.uid)el.scrollTop=el.scrollHeight;
 });

 // Ajustar altura cuando el teclado abre en iOS
 if(window.visualViewport){
 const ajustarAltura=()=>{
 const wrap=document.querySelector('.chat-wrap');
 if(!wrap)return;
 const headerH=document.querySelector('.header')?.offsetHeight||0;
 const disponible=window.visualViewport.height-headerH-32;
 wrap.style.height=Math.max(disponible,200)+'px';
 const msgs=document.getElementById('chat-messages');
 if(msgs)msgs.scrollTop=msgs.scrollHeight;
 };
 window.visualViewport.addEventListener('resize',ajustarAltura);
 ajustarAltura();
 }
}

function escHtml(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

window.sendChat=async function(){
 const inp=document.getElementById("chat-input");
 const text=(inp?.value||"").trim();
 if(!text||!currentPollaId||!currentUser)return;
 inp.value="";inp.style.height="auto";
 track('chat_message_sent');
 await db.ref(`pollas/${currentPollaId}/chat`).push({uid:currentUser.uid,name:currentUser.name,text,ts:Date.now()});
};

document.addEventListener("keydown",function(e){

 if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
 const isDesktop=window.innerWidth>=900;
 const groupKeys=Object.keys(GROUPS);
 const elimIds=ELIM_PHASES.map(p=>p.id);
 const tabIds=["grupos","mis_pronos","eliminatorias",...(currentPolla?.rules?.incluirEspeciales!==false?["especiales"]:[]),"ranking","chat"];

 // On desktop: Up/Down always change tabs; Left/Right change pills when relevant
 // On mobile: Left/Right always change tabs
 if(isDesktop){
  if(e.key==="ArrowDown"||e.key==="ArrowUp"){
   e.preventDefault();
   const dir=e.key==="ArrowDown"?1:-1;
   const i=tabIds.indexOf(currentTab);
   setTab(tabIds[(i+dir+tabIds.length)%tabIds.length]);
  }else if(e.key==="ArrowRight"||e.key==="ArrowLeft"){
   const dir=e.key==="ArrowRight"?1:-1;
   if((currentTab==="grupos"||currentTab==="mis_pronos")){
    e.preventDefault();
    const i=groupKeys.indexOf(currentGroup);

    e.preventDefault();
    const i=elimIds.indexOf(currentElimPhase);
    setElimPhase(elimIds[(i+dir+elimIds.length)%elimIds.length]);
   }
  }
 }else{
  if(e.key==="ArrowRight"||e.key==="ArrowLeft"){
   const dir=e.key==="ArrowRight"?1:-1;
   const i=tabIds.indexOf(currentTab);
   setTab(tabIds[(i+dir+tabIds.length)%tabIds.length]);

 }
});

const _acFocus={};
window.acFilter=function(fieldId, val){
 const drop=document.getElementById(`ac-drop-${fieldId}`);
 if(!drop)return;
 const isTeam=fieldId==="campeon";
 const list=isTeam?ALL_TEAMS:DT_PLAYERS;
 const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
 const q=norm(val.trim());
 if(!q){drop.style.display="none";return;}
 const filtered=list.filter(x=>norm(x).includes(q)).slice(0,8);
 if(!filtered.length){drop.style.display="none";return;}
 _acFocus[fieldId]=-1;
 drop.innerHTML=filtered.map((x,i)=>
 `<div class="autocomplete-item" data-idx="${i}" onmousedown="acSelect('${fieldId}','${x.replace(/'/g,"\\'")}')">
 ${isTeam?flag(x)+" ":""}<span>${x}</span>
 </div>`
 ).join("");
 drop.style.display="block";
};
window.acSelect=function(fieldId, val){
 const inp=document.getElementById(`ac-${fieldId}`);
 if(inp){inp.value=val;saveEspecial(fieldId,val);}
 acClose(fieldId);
 showToast("Guardado ");
};
window.acClose=function(fieldId){
 const drop=document.getElementById(`ac-drop-${fieldId}`);
 if(drop)drop.style.display="none";
 // Save on blur
 const inp=document.getElementById(`ac-${fieldId}`);
 if(inp)saveEspecial(fieldId,inp.value.trim());
};
window.acKey=function(e,fieldId){
 const drop=document.getElementById(`ac-drop-${fieldId}`);
 if(!drop||drop.style.display==="none")return;
 const items=drop.querySelectorAll(".autocomplete-item");
 if(!items.length)return;
 if(e.key==="ArrowDown"){e.preventDefault();_acFocus[fieldId]=Math.min((_acFocus[fieldId]||0)+1,items.length-1);}
 else if(e.key==="ArrowUp"){e.preventDefault();_acFocus[fieldId]=Math.max((_acFocus[fieldId]||0)-1,0);}
 else if(e.key==="Enter"&&_acFocus[fieldId]>=0){e.preventDefault();items[_acFocus[fieldId]].dispatchEvent(new Event("mousedown"));return;}
 else if(e.key==="Escape"){acClose(fieldId);return;}
 items.forEach((el,i)=>{el.classList.toggle("focused",i===_acFocus[fieldId]);if(i===_acFocus[fieldId])el.scrollIntoView({block:"nearest"});});
};

window.openBreakdown=function(uid){

 const adminEsp=allResults["especiales"]||{};
 const realGrp=allResults["groupOrder"]||{};
 const matchPts=MATCHES.filter(m=>m.phase==="groups").reduce((s,m)=>s+(calcMatchPointsR(preds[m.id],allResults[m.id],r)||0),0);
 const espPts=r.incluirEspeciales?ESPECIALES_FIELDS.reduce((s,f)=>{
 const ruleKey="esp"+f.id.charAt(0).toUpperCase()+f.id.slice(1);
 const pts=r[ruleKey]??f.pts;
 const p=(esp[f.id]||"").trim().toLowerCase(),rv=(adminEsp[f.id]||"").trim().toLowerCase();
 return s+(p&&rv&&p===rv?pts:0);
 },0):0;
 const grpPts=r.incluirClasificacion!==false?Object.keys(GROUPS).reduce((s,g)=>s+calcGroupPredPointsR(grp[g],realGrp[g],r),0):0;
 const elimPts=MATCHES.filter(m=>m.phase!=="groups").reduce((s,m)=>s+(calcElimPointsR(elim[m.id],allResults[m.id],r)||0),0);
 const total=matchPts+espPts+grpPts+elimPts;
 const isMine=uid===currentUser.uid;
 const streak=getStreak(uid);
 // Max pts based on what this user actually bet on (not theoretical total)
 const matchMaxPts=MATCHES.filter(m=>m.phase==="groups"&&preds[m.id]?.h!==undefined&&preds[m.id]?.h!=="").length*(r.ptsExactoGrupos??3);
 const grpMaxPts=Object.keys(GROUPS).filter(g=>grp[g]&&grp[g].length).length*4*(r.ptsPosGrupo??2);
 const elimMaxPts=MATCHES.filter(m=>m.phase!=="groups"&&elim[m.id]?.winner).length*(r.ptsExactoElim??3);
 const espMaxPts=r.incluirEspeciales?ESPECIALES_FIELDS.reduce((s,f)=>{
  const ruleKey="esp"+f.id.charAt(0).toUpperCase()+f.id.slice(1);
  return s+(esp[f.id]?.trim()?(r[ruleKey]??f.pts):0);
 },0):0;
 const rows=[
 {icon:"🟢",label:"Partidos de grupos",val:matchPts,max:matchMaxPts},
 {icon:"",label:"Clasificación grupos",val:grpPts,max:grpMaxPts},
 {icon:"",label:"Eliminatorias",val:elimPts,max:elimMaxPts},
 {icon:"",label:"Especiales",val:espPts,max:espMaxPts},
 ];
 document.getElementById("breakdown-content").innerHTML=`

 ${streak>=3?`<div style="font-size:12px;color:var(--text-muted)"> Racha de ${streak} aciertos seguidos</div>`:""}
 </div>
 </div>
 ${rows.map(row=>`<div class="rb-row">
 <div class="rb-label">${row.icon} ${row.label}</div>
 <div style="display:flex;align-items:baseline;gap:4px">
 <span class="rb-val">${row.val}</span>
 <span style="font-size:11px;color:var(--text-dim)">/${row.max}</span>
 </div>
 </div>`).join("")}
 <div class="rb-row" style="border-top:2px solid var(--primary);margin-top:4px;padding-top:12px">
 <div style="font-size:15px;font-weight:700;color:var(--text)"> Total</div>

const REACTION_EMOJIS=["","","",""];
let _rxnTimer=null,_rxnEl=null;

function initReactionListeners(){
 // Remove existing listeners by re-querying
 document.querySelectorAll(".spectator-pred").forEach(el=>{
 el.addEventListener("touchstart",rxnTouchStart,{passive:true});
 el.addEventListener("touchend",rxnTouchEnd,{passive:true});
 el.addEventListener("touchcancel",rxnTouchEnd,{passive:true});
 el.addEventListener("contextmenu",e=>{e.preventDefault();rxnShow(el);},{passive:false});
 });
}

function rxnTouchStart(e){
 const el=this;
 _rxnEl=el;
 _rxnTimer=setTimeout(()=>{if(navigator.vibrate)navigator.vibrate(30);rxnShow(el);},400);
}
function rxnTouchEnd(){
 clearTimeout(_rxnTimer);
 _rxnEl=null;
}
function rxnShow(el){
 rxnCloseFloat();
 const matchId=parseInt(el.dataset.match);
 const predictorUid=el.dataset.uid;
 const rect=el.getBoundingClientRect();
 const float=document.createElement("div");
 float.className="reaction-float";
 float.id="rxn-float";
 float.style.top=Math.max(8,(rect.top-54))+"px";
 float.style.left=Math.max(8,Math.min(rect.left,window.innerWidth-200))+"px";
 REACTION_EMOJIS.forEach(e=>{
 const btn=document.createElement("button");
 btn.className="reaction-btn";
 btn.textContent=e;
 btn.onclick=()=>rxnSave(matchId,predictorUid,e);
 float.appendChild(btn);
 });
 document.body.appendChild(float);
 setTimeout(()=>document.addEventListener("touchstart",rxnCloseFloat,{once:true,passive:true}),50);
}
function rxnCloseFloat(){
 const f=document.getElementById("rxn-float");
 if(f)f.remove();
}
async function rxnSave(matchId,predictorUid,emoji){
 rxnCloseFloat();
 if(!currentPollaId||!currentUser)return;
 const path=`pollas/${currentPollaId}/reactions/${matchId}/${predictorUid}/${currentUser.uid}`;
 await db.ref(path).set(emoji);
 showToast(emoji+" Reacción guardada");
}

// ─── Helpers de fecha ─────────────────────────────────────────
function tvTodayNum(){
 const s=new Date(TRIVIA_START+'T00:00:00');
 const n=new Date();
 const sd=new Date(s.getFullYear(),s.getMonth(),s.getDate());
 const nd=new Date(n.getFullYear(),n.getMonth(),n.getDate());
 return Math.round((nd-sd)/86400000)+1;
}
function tvDaysLeft(){
 return Math.max(0,Math.ceil((new Date('2026-06-11T00:00:00')-new Date())/86400000));
}
function tvStreak(){
 const today=Math.min(tvTodayNum(),14);
 let s=0;for(let d=today;d>=1;d--){if(triviaProgress[`day_${d}`]?.completed)s++;else break;}
 return s;
}
function tvTotalCorrect(){return Object.values(triviaProgress).reduce((s,v)=>s+(v.score||0),0);}
function tvDaysCompleted(){return Object.values(triviaProgress).filter(v=>v.completed).length;}
function tvScoreEmoji(s){if(s===5)return'🏆';if(s>=4)return'🌟';if(s>=3)return'⚽';if(s>=2)return'😬';return'😅';}
function tvScoreMsg(s){
 if(s===5)return'¡Perfecto! Eres un experto mundialero 🏆';
 if(s===4)return'¡Muy bien! Solo una te escapó';
 if(s===3)return'Bien, pero hay que estudiar más 📚';
 if(s===2)return'Regular... mañana recuperas';
 if(s<=1)return'Uy, hay que repasar esto 😅';
}
const TV_OK_MSGS=['¡Correcto! Eres un crack 🔥','¡Exacto! Lo sabías 👏','¡Bien! Eso lo tenías claro ✅','¡Correcto, bien jugado! ⚽'];
const TV_BAD_FUNS=[m=>`Uy, era "${m}" 😬`,m=>`No era esa, era "${m}" 😅`,m=>`Casi... La respuesta era "${m}" `,m=>`Se te fue, era "${m}" 😤`];
function tvOkMsg(){return TV_OK_MSGS[Math.floor(Math.random()*TV_OK_MSGS.length)];}
function tvBadMsg(correct){return TV_BAD_FUNS[Math.floor(Math.random()*TV_BAD_FUNS.length)](correct);}

// ─── Firebase ─────────────────────────────────────────────────
async function loadTriviaProgress(){
 if(!currentUser)return;
 try{
  const snap=await db.ref(`triviaProgress/${currentUser.uid}`).get();
  triviaProgress=snap.exists()?(snap.val()||{}):{};
 }catch(e){triviaProgress={};}
}
async function tvSaveDay(day,score,answers){
 const data={score,answers,completed:true,ts:Date.now()};
 await db.ref(`triviaProgress/${currentUser.uid}/day_${day}`).set(data);
 triviaProgress[`day_${day}`]=data;
}

window.tvPickAnswer=function(idx){
 document.querySelectorAll('.tv-opt').forEach(b=>b.disabled=true);
 const q=TV_QUESTIONS[tvQuizDay-1][tvQuizQIdx];
 const correct=idx===q.a;
 tvQuizAns.push(idx);
 for(let i=0;i<4;i++){
  const btn=document.getElementById(`tv-opt-${i}`);
  if(i===idx){btn.classList.add(correct?'correct':'wrong');}
  else if(i===q.a){btn.classList.add('correct');}
  else{btn.classList.add('faded');}
 }
 const fb=document.getElementById('tv-fb');
 const fbIcon=document.getElementById('tv-fb-icon');
 const fbMsg=document.getElementById('tv-fb-msg');
 fb.classList.add('show',correct?'c':'w');
 fbIcon.textContent=correct?'✅':'❌';
 fbMsg.className='tv-fb-msg '+(correct?'c':'w');
 fbMsg.textContent=correct?tvOkMsg():tvBadMsg(q.opts[q.a]);
 document.getElementById('tv-next').classList.add('show');
 const dots=document.querySelectorAll('.tv-dot');
 if(dots[tvQuizQIdx]){dots[tvQuizQIdx].classList.remove('active');dots[tvQuizQIdx].classList.add(correct?'correct':'wrong');}
};

window.tvNextQuestion=async function(){
 if(tvQuizQIdx<4){tvQuizQIdx++;tvRenderQuestion();}
 else{
  const score=tvQuizAns.filter((a,i)=>a===TV_QUESTIONS[tvQuizDay-1][i].a).length;
  track('trivia_completed',{day:tvQuizDay,score});
  await tvSaveDay(tvQuizDay,score,tvQuizAns);
  tvRenderResults(tvQuizDay,score,tvQuizAns);
 }
};

   <div class="tv-rq">${q.q}</div>
   <div class="tv-rbadge ${ok?'c':'w'}">${ok?q.opts[q.a]:`→ ${q.opts[q.a]}`}</div>
  </div>`;
 }).join('');
 document.getElementById('root').innerHTML=`
  <div style="max-width:520px;margin:0 auto;padding:12px 12px 80px">
   <div class="card">
    <div style="text-align:center;padding:8px 0 12px">
     <div style="font-size:12px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Día ${day} · ${TV_THEMES[day-1]}</div>
     <div style="font-size:64px;font-weight:900;color:var(--primary);line-height:1">${score}</div>
     <div style="font-size:15px;font-weight:700;color:var(--text-muted)">de 5 correctas</div>
     <div style="font-size:30px;margin:6px 0">${tvScoreEmoji(score)}</div>
     <div style="font-size:13px;font-weight:800;color:var(--text-muted)">${tvScoreMsg(score)}</div>
    </div>
    <div>${rowsHtml}</div>
    <button onclick="renderTriviaLobby()" style="width:100%;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:14px;padding:13px;font-size:15px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:14px">← Volver al inicio</button>
   </div>
  </div>`;
}

// ─── REVIEW (día ya jugado) ────────────────────────────────────
window.tvOpenReview=function(day){
 const dp=triviaProgress[`day_${day}`];
 if(!dp){renderTriviaLobby();return;}
 const qs=TV_QUESTIONS[day-1];
 const answers=dp.answers||[];
 const letters=['A','B','C','D'];
 const qHtml=qs.map((q,i)=>{
  const chosen=answers[i];
  const correct=q.a;
  return`<div class="tv-rev-q">
   <div class="tv-rev-qtext">${i+1}. ${q.q}</div>
   ${q.opts.map((o,j)=>{
    let cls='tv-rev-opt ';
    if(j===chosen&&j===correct)cls+='c';
    else if(j===chosen&&j!==correct)cls+='w';
    else if(j===correct&&chosen!==correct)cls+='ca';
    else cls+='n';
    return`<div class="${cls}"><span style="font-weight:900;opacity:.6;min-width:14px">${letters[j]}</span><span style="flex:1">${o}</span>${j===correct?'<span style="font-size:10px;flex-shrink:0">✓</span>':''}</div>`;
   }).join('')}
  </div>`;
 }).join('');
 document.getElementById('root').innerHTML=`
  <div style="max-width:520px;margin:0 auto;padding:12px 12px 80px">
   <div class="card">
    <button class="tv-back" onclick="renderTriviaLobby()" style="margin-bottom:12px">← Volver</button>
    <div style="font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">Día ${day} · ${TV_THEMES[day-1]}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
     <span style="font-size:28px;font-weight:900;color:var(--primary)">${dp.score}/5</span>
     <span style="font-size:22px">${tvScoreEmoji(dp.score)}</span>
     <span style="font-size:12px;font-weight:700;color:var(--text-muted)">${tvScoreMsg(dp.score)}</span>
    </div>
    ${qHtml}
   </div>
  </div>`;
};

window.addEventListener("load",initFirebase);
</script>
</body>
</html>
