<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f172a;color:#f1f5f9;font-family:'Inter',sans-serif;min-height:100vh}
  .app{max-width:680px;margin:0 auto;padding-bottom:80px}
  .header{background:linear-gradient(135deg,#1e3a5f,#0f172a);padding:20px 16px 0;text-align:center;border-bottom:2px solid #1e40af}
  .header h1{font-size:22px;font-weight:800;letter-spacing:1px;margin:6px 0 2px}
  .header p{color:#94a3b8;font-size:12px;margin-bottom:12px}
  .tabs{display:flex;overflow-x:auto;gap:4px}
  .tab{flex:0 0 auto;padding:8px 14px;font-size:11px;font-weight:600;border:none;border-radius:8px 8px 0 0;cursor:pointer;white-space:nowrap}
  .tab.active{background:#1e40af;color:#fff;border-bottom:2px solid #3b82f6}
  .tab:not(.active){background:transparent;color:#94a3b8;border-bottom:2px solid transparent}
  .content{padding:16px 12px}
  .card{background:#1e293b;border-radius:10px;padding:14px;margin-bottom:10px}
  .match-card{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:8px}
  .match-meta{font-size:11px;color:#64748b;margin-bottom:6px;display:flex;justify-content:space-between}
  .match-teams{display:flex;align-items:center;gap:8px}
  .team{flex:1;font-weight:600;font-size:13px}
  .team.home{text-align:right}
  .score-input{width:36px;text-align:center;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#fff;padding:4px;font-size:14px;font-weight:700}
  .score-input.result{border-color:#22c55e;color:#22c55e}
  .score-sep{color:#64748b;font-weight:700}
  .group-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .pill{padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700}
  .rank-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #0f172a}
  .rank-row:last-child{border-bottom:none}
  .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
  .login-screen h1{font-size:28px;font-weight:800;margin:12px 0 4px}
  .input{width:100%;max-width:340px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#fff;padding:12px 16px;font-size:16px;margin-bottom:12px;outline:none}
  .input:focus{border-color:#3b82f6}
  .btn{width:100%;max-width:340px;background:#1e40af;color:#fff;border:none;border-radius:10px;padding:13px;font-size:16px;font-weight:700;cursor:pointer}
  .btn:disabled{background:#334155;cursor:not-allowed}
  .error{color:#ef4444;font-size:13px;margin-bottom:10px;max-width:340px}
  .lock-badge{font-size:10px;background:#334155;color:#94a3b8;padding:2px 6px;border-radius:10px;margin-left:4px}
  .admin-badge{background:#7c3aed;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
  .spinner{text-align:center;padding:60px;color:#64748b;font-size:14px}
</style>

// ─── STATE ────────────────────────────────────────────────
let db, auth;
let currentUser = null;
let currentTab = "fixture";
let currentGroup = "A";
let allUsers = {};
let allResults = {};
let myPredictions = {};
let isAdmin = false;

// ─── UTILS ────────────────────────────────────────────────
function calcPoints(pred, res) {
  if (!pred || !res) return null;
  const ph = parseInt(pred.h), pa = parseInt(pred.a);
  const rh = parseInt(res.h), ra = parseInt(res.a);
  if (isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra)) return null;
  if (res.h === "" || res.a === "") return null;
  if (ph===rh && pa===ra) return 3;
  if (Math.sign(ph-pa) === Math.sign(rh-ra)) return 1;
  return 0;
}
function isLocked(m) { return new Date() >= new Date(m.kickoff); }
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
function totalPoints(preds) {
  return MATCHES.reduce((s, m) => s + (calcPoints(preds?.[m.id], allResults?.[m.id]) || 0), 0);
}

// ─── FIREBASE INIT ────────────────────────────────────────
function initFirebase() {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
  auth = firebase.auth();

  firebase.auth().onAuthStateChanged(async () => {
    const savedUid = localStorage.getItem("pollaUid");
    if (savedUid) {
      try {
        const snap = await db.ref(`users/${savedUid}`).get();
        if (snap.exists()) {
          const u = snap.val();
          currentUser = { uid: savedUid, name: u.name };
          isAdmin = u.name.toUpperCase() === ADMIN_NAME.toUpperCase();
          loadData(); return;
        }
      } catch(e) {}
    }
    renderLogin();
  });
}

// ─── DATA ─────────────────────────────────────────────────
function loadData() {
  db.ref("users").on("value", snap => {
    allUsers = snap.val() || {};
    myPredictions = allUsers[currentUser.uid]?.predictions || {};
    render();
  });
  db.ref("results").on("value", snap => {
    allResults = snap.val() || {};
    render();
  });
  fetchLiveResults();
  setInterval(fetchLiveResults, 120000);
}

async function fetchLiveResults() {
  try {
    const res = await fetch("https://api.balldontlie.io/fifa/worldcup/v1/matches?seasons[]=2026&per_page=200", {
      headers: { Authorization: BALLDONTLIE_KEY }
    });
    const data = await res.json();
    if (!data.data) return;
    for (const m of data.data) {
      if (m.status !== "completed" && m.status !== "in_progress") continue;
      if (m.home_score == null || m.away_score == null) continue;
      const match = MATCHES.find(x =>
        x.home.toLowerCase().includes((m.home_team?.name||"").toLowerCase().split(" ")[0])
      );
      if (match) await db.ref(`results/${match.id}`).set({ h: String(m.home_score), a: String(m.away_score) });
    }
  } catch(e) { console.log("API error:", e); }
}

      <button class="btn" id="loginBtn" onclick="doLogin()">Entrar 🚀</button>

window.doLogin = async function() {
  const name = document.getElementById("nameInput").value.trim();
  const errEl = document.getElementById("loginError");
  const btn = document.getElementById("loginBtn");
  if (!name || name.length < 2) { errEl.textContent = "Escribe tu nombre (mínimo 2 caracteres)"; return; }
  btn.disabled = true; btn.textContent = "Entrando...";
  try {
    const snap = await db.ref("users").get();
    const users = snap.val() || {};
    const existing = Object.entries(users).find(([,u]) => u.name.toLowerCase() === name.toLowerCase());
    let uid;
    if (existing) {
      // El nombre existe — es este usuario volviendo a entrar, permitir siempre
      uid = existing[0];
      localStorage.setItem("pollaUid", uid);
    } else {
      // Nombre nuevo — registrar
      const cred = await auth.signInAnonymously();
      uid = cred.user.uid;
      await db.ref(`users/${uid}`).set({ name, predictions: {} });
      localStorage.setItem("pollaUid", uid);
    }
    currentUser = { uid, name };
    isAdmin = name.toUpperCase() === ADMIN_NAME.toUpperCase();
    loadData();
  } catch(e) {
    errEl.textContent = "Error al conectar. Recarga la página.";
    btn.disabled = false; btn.textContent = "Entrar 🚀";
  }
};

function calcGroupTable(g) {
  const teams = GROUPS[g];
  const stats = {};
  teams.forEach(t => stats[t] = {pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0});
  MATCHES.filter(m => m.group === g).forEach(m => {
    const res = allResults[m.id];
    if (!res || res.h === "" || res.h === undefined) return;
    const rh = parseInt(res.h), ra = parseInt(res.a);
    if (isNaN(rh)||isNaN(ra)) return;
    const h = m.home, a = m.away;
    if (!stats[h] || !stats[a]) return;
    stats[h].pj++; stats[a].pj++;
    stats[h].gf += rh; stats[h].gc += ra;
    stats[a].gf += ra; stats[a].gc += rh;
    if (rh > ra) { stats[h].pts+=3; stats[h].pg++; stats[a].pp++; }
    else if (rh < ra) { stats[a].pts+=3; stats[a].pg++; stats[h].pp++; }
    else { stats[h].pts+=1; stats[a].pts+=1; stats[h].pe++; stats[a].pe++; }
  });
  return Object.entries(stats)
    .map(([t,s]) => ({team:t,...s,dif:s.gf-s.gc}))
    .sort((a,b) => b.pts-a.pts || b.dif-a.dif || b.gf-a.gf);
}

          <tbody>
            ${table.map((r,i) => `
              <tr style="border-bottom:${i<table.length-1?"1px solid #0f172a":"none"}">
                <td style="padding:8px 10px">
                  <div style="width:6px;height:26px;background:${posColors[i]};border-radius:3px" title="${posTips[i]}"></div>
                </td>
                <td style="padding:8px 4px;font-weight:600;white-space:nowrap">${flag(r.team)} ${r.team}</td>
                <td style="padding:8px 4px;text-align:center;color:#94a3b8">${r.pj}</td>
                <td style="padding:8px 4px;text-align:center;color:#94a3b8">${r.pg}</td>
                <td style="padding:8px 4px;text-align:center;color:#94a3b8">${r.pe}</td>
                <td style="padding:8px 4px;text-align:center;color:#94a3b8">${r.pp}</td>
                <td style="padding:8px 4px;text-align:center;color:${r.dif>0?"#22c55e":r.dif<0?"#ef4444":"#94a3b8"}">${r.dif>0?"+":""}${r.dif}</td>
                <td style="padding:8px 10px;text-align:center;font-weight:800;font-size:14px;color:${GROUP_COLORS[g]}">${r.pts}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>
      <div style="display:flex;gap:12px;padding:8px 14px;border-top:1px solid #0f172a">
        ${posColors.map((c,i) => `<span style="display:flex;align-items:center;gap:4px;font-size:10px;color:#64748b">
          <span style="width:6px;height:6px;background:${c};border-radius:50%;display:inline-block"></span>${posTips[i]}
        </span>`).join("")}
      </div>
    </div>`;
  }).join("");
}

// ─── ACTIONS ──────────────────────────────────────────────
window.deleteUser = async function(uid, name) {
  if (!isAdmin) return;
  if (!confirm(`¿Eliminar a "${name}" y todos sus pronósticos?`)) return;
  await db.ref(`users/${uid}`).remove();
  showToast(`${name} eliminado ✓`);
};
window.savePred = async function(matchId, side, val) {
  if (isLocked(MATCHES.find(m => m.id === matchId))) return;
  myPredictions[matchId] = { ...(myPredictions[matchId]||{}), [side]: val };
  await db.ref(`users/${currentUser.uid}/predictions/${matchId}`).update({ [side]: val });
};
window.saveResult = async function(matchId, side, val) {
  if (!isAdmin) return;
  allResults[matchId] = { ...(allResults[matchId]||{}), [side]: val };
  await db.ref(`results/${matchId}`).update({ [side]: val });
  showToast("Resultado guardado ✓");
};
window.setTab = function(t) { currentTab = t; currentGroup = "A"; render(); };
window.setGroup = function(g) { currentGroup = g; renderTab(); };
window.logout = function() { localStorage.removeItem("pollaUid"); currentUser = null; renderLogin(); };

// ─── START ────────────────────────────────────────────────
window.addEventListener("load", initFirebase);
</script>
</body>
</html>
