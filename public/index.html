<title>Calentando Motores · Mundial 2026</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F7F7;--surface:#FFFFFF;--surface-2:#F0F0F0;--surface-3:#E5E5E5;
  --border:#E5E5E5;--border-strong:#CACACA;
  --text:#3C3C3C;--text-muted:#777777;--text-dim:#AFAFAF;
  --primary:#FF9600;--primary-hover:#E68600;--primary-dark:#CC7700;--primary-soft:#FFF3D4;
  --secondary:#1CB0F6;--secondary-soft:#DFF4FF;
  --success:#58CC02;--success-text:#3D9100;--success-soft:#DCFCE7;
  --danger:#FF4B4B;--danger-soft:#FFD5D5;--danger-text:#CC0000;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Nunito',-apple-system,sans-serif;min-height:100vh}
.app{max-width:520px;margin:0 auto;padding:8px 8px 72px}

/* ── HEADER ── */
.header{position:relative;padding:18px 16px 14px;text-align:center;background:var(--surface);border-radius:20px;margin-bottom:8px;border:2px solid var(--border);box-shadow:0 4px 0 var(--border-strong);overflow:hidden}
.header::before{content:"";position:absolute;left:0;right:0;top:0;height:5px;background:linear-gradient(90deg,#ef4444,#f97316,#facc15,#22c55e,#3b82f6,#a855f7);border-radius:20px 20px 0 0}
.header-ball{font-size:28px;line-height:1;margin-bottom:2px}
.header h1{font-size:19px;font-weight:900;text-transform:uppercase;letter-spacing:-0.3px;color:var(--text);margin-bottom:1px}
.header-sub{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:10px}
.badges{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:4px 11px;font-size:12px;font-weight:800;border:2px solid}
.badge-fire{background:var(--primary-soft);border-color:var(--primary);color:var(--primary-dark)}
.badge-wc{background:var(--secondary-soft);border-color:var(--secondary);color:var(--secondary)}

/* ── CARD ── */
.card{background:var(--surface);border-radius:18px;padding:16px;margin-bottom:10px;border:2px solid var(--border);box-shadow:0 4px 0 var(--border-strong)}
.card-title{font-size:11px;font-weight:800;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:10px 6px;text-align:center;box-shadow:0 3px 0 var(--border-strong)}
.stat-n{font-size:22px;font-weight:900;color:var(--primary)}
.stat-l{font-size:9px;font-weight:700;color:var(--text-muted);margin-top:1px;text-transform:uppercase;letter-spacing:.5px}

/* ── DAY GRID ── */
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.day-cell{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid var(--border);box-shadow:0 3px 0 var(--border-strong);transition:transform .1s;position:relative;overflow:hidden;user-select:none}
.day-cell.done{background:var(--success-soft);border-color:var(--success);box-shadow:0 3px 0 var(--success-text);cursor:pointer}
.day-cell.done:active{transform:translateY(2px);box-shadow:none}
.day-cell.today{background:var(--primary);border-color:var(--primary-dark);box-shadow:0 3px 0 var(--primary-dark);cursor:pointer;animation:todayPulse 2.2s ease-in-out infinite}
.day-cell.today:active{transform:translateY(2px);box-shadow:none}
.day-cell.locked{background:var(--surface-2);opacity:.55;cursor:not-allowed}
.day-cell.today-done{background:var(--success-soft);border-color:var(--success);box-shadow:0 3px 0 var(--success-text)}
@keyframes todayPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.dc-num{font-size:13px;font-weight:900;color:var(--text)}
.day-cell.today .dc-num,.day-cell.today.done .dc-num{color:#fff}
.day-cell.locked .dc-num{color:var(--text-dim)}
.dc-score{font-size:8px;font-weight:800;color:var(--success-text);line-height:1}
.day-cell.today .dc-score{color:rgba(255,255,255,.9)}
.dc-icon{font-size:9px;line-height:1}

/* ── TODAY CARD ── */
.today-card{background:linear-gradient(145deg,var(--primary-soft),#fff9ed);border-color:var(--primary);box-shadow:0 4px 0 var(--primary-dark)}
.today-theme{font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.today-title{font-size:16px;font-weight:900;color:var(--text);margin-bottom:14px;line-height:1.3}
.start-btn{width:100%;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:14px;padding:14px;font-size:15px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .1s;letter-spacing:.2px}
.start-btn:hover{background:var(--primary-hover)}
.start-btn:active{border-bottom-width:0;transform:translateY(4px)}
.start-btn:disabled{background:var(--surface-3);color:var(--text-dim);cursor:default;border-bottom-color:var(--border-strong)}

/* ── QUIZ ── */
.quiz-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back-btn{background:var(--surface-2);border:2px solid var(--border);border-bottom:3px solid var(--border-strong);border-radius:10px;padding:6px 12px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--text-muted);flex-shrink:0;transition:all .1s}
.back-btn:hover{border-color:var(--primary);color:var(--primary)}
.back-btn:active{border-bottom-width:0;transform:translateY(2px)}
.q-progress{flex:1}
.q-progress-label{font-size:10px;font-weight:700;color:var(--text-muted);text-align:right;margin-bottom:3px}
.q-progress-bar{height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.q-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#ffb833);border-radius:4px;transition:width .35s ease}
.q-dots{display:flex;gap:5px;justify-content:center;margin-bottom:16px}
.q-dot{width:9px;height:9px;border-radius:50%;background:var(--surface-3);border:2px solid var(--border);transition:all .2s;flex-shrink:0}
.q-dot.active{background:var(--primary);border-color:var(--primary-dark);transform:scale(1.25)}
.q-dot.correct{background:var(--success);border-color:var(--success-text)}
.q-dot.wrong{background:var(--danger);border-color:var(--danger-text)}
.q-text{font-size:17px;font-weight:800;color:var(--text);text-align:center;line-height:1.45;margin-bottom:20px;padding:0 2px}
.q-options{display:flex;flex-direction:column;gap:9px}
.opt{width:100%;background:var(--surface);color:var(--text);border:2px solid var(--border);border-bottom:4px solid var(--border-strong);border-radius:14px;padding:13px 15px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;text-align:left;display:flex;align-items:center;gap:10px;transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent}
.opt:hover:not(:disabled){border-color:var(--primary);background:#fffbf5}
.opt:disabled{cursor:default}
.opt.correct{background:var(--success-soft);border-color:var(--success);border-bottom-color:var(--success-text);color:var(--success-text)}
.opt.wrong{background:var(--danger-soft);border-color:var(--danger);border-bottom-color:var(--danger-text);color:var(--danger-text)}
.opt.faded:disabled{opacity:.45}
.opt-letter{width:26px;height:26px;border-radius:50%;background:var(--surface-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;transition:all .15s}
.opt.correct .opt-letter{background:var(--success);border-color:var(--success-text);color:#fff}
.opt.wrong .opt-letter{background:var(--danger);border-color:var(--danger-text);color:#fff}
.feedback{border-radius:14px;padding:12px 14px;margin-top:12px;display:none;align-items:center;gap:10px;animation:fbIn .2s ease}
@keyframes fbIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.feedback.show{display:flex}
.feedback.c{background:var(--success-soft);border:2px solid var(--success)}
.feedback.w{background:var(--danger-soft);border:2px solid var(--danger)}
.fb-icon{font-size:22px;flex-shrink:0}
.fb-msg{font-size:13px;font-weight:700}
.fb-msg.c{color:var(--success-text)}
.fb-msg.w{color:var(--danger-text)}
.next-btn{width:100%;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:14px;padding:13px;font-size:15px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:12px;transition:all .1s;display:none}
.next-btn.show{display:block}
.next-btn:active{border-bottom-width:0;transform:translateY(4px)}

/* ── RESULTS ── */
.result-big{text-align:center;padding:12px 0 8px}
.result-score{font-size:68px;font-weight:900;line-height:1;color:var(--primary)}
.result-of{font-size:16px;font-weight:700;color:var(--text-muted)}
.result-label{font-size:14px;font-weight:800;color:var(--text-muted);margin-top:4px}
.result-rows{margin-top:14px;display:flex;flex-direction:column;gap:0}
.result-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:2px solid var(--border)}
.result-row:last-child{border-bottom:none}
.result-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.result-q{flex:1;font-size:12px;font-weight:700;color:var(--text-muted);line-height:1.35;padding-right:6px}
.result-badge{font-size:11px;font-weight:800;padding:3px 8px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.result-badge.c{background:var(--success-soft);color:var(--success-text)}
.result-badge.w{background:var(--danger-soft);color:var(--danger-text)}
.home-btn{width:100%;background:var(--surface);color:var(--text-muted);border:2px solid var(--border);border-bottom:4px solid var(--border-strong);border-radius:14px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:10px;transition:all .1s}
.home-btn:hover{border-color:var(--primary);color:var(--primary)}
.home-btn:active{border-bottom-width:0;transform:translateY(4px)}

/* ── REVIEW (past day) ── */
.review-tag{display:inline-block;background:var(--primary-soft);border:2px solid var(--primary);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;color:var(--primary-dark);margin-bottom:12px}
.review-q{margin-bottom:12px;padding-bottom:12px;border-bottom:2px solid var(--border)}
.review-q:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.review-q-text{font-size:13px;font-weight:800;color:var(--text);margin-bottom:6px;line-height:1.4}
.review-q-opts{display:flex;flex-direction:column;gap:4px}
.review-opt{font-size:12px;font-weight:700;padding:7px 10px;border-radius:10px;border:2px solid transparent;display:flex;align-items:center;gap:7px}
.review-opt.c{background:var(--success-soft);border-color:var(--success);color:var(--success-text)}
.review-opt.w{background:var(--danger-soft);border-color:var(--danger);color:var(--danger-text)}
.review-opt.neutral{color:var(--text-dim);background:var(--surface-2);border-color:var(--border)}
.review-opt.correct-ans{background:var(--success-soft);border-color:var(--success);color:var(--success-text);opacity:.7}

/* ── LOGIN ── */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.login-wrap h1{font-size:24px;font-weight:900;margin:10px 0 5px}
.login-sub{font-size:13px;color:var(--text-muted);font-weight:700;margin-bottom:24px}
.inp{width:100%;max-width:340px;background:var(--surface);border:2px solid var(--border);border-radius:14px;color:var(--text);padding:13px 16px;font-size:16px;margin-bottom:10px;outline:none;font-family:'Nunito',sans-serif;font-weight:700;transition:border-color .15s}
.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.btn{width:100%;max-width:340px;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:14px;padding:14px;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .1s;margin-bottom:10px}
.btn:hover{background:var(--primary-hover)}
.btn:active{border-bottom-width:0;transform:translateY(4px)}
.btn:disabled{background:var(--surface-3);color:var(--text-dim);cursor:not-allowed;border-bottom-color:var(--border-strong)}
.err{color:var(--danger);font-size:13px;font-weight:800;margin-bottom:8px;max-width:340px}

/* ── SPINNER ── */
.spinner{text-align:center;padding:64px 24px;color:var(--text-muted);font-size:14px;font-weight:700}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite;font-size:28px}

/* ── EMPTY STATES ── */
.empty{text-align:center;padding:28px 16px;color:var(--text-muted)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-title{font-size:17px;font-weight:900;color:var(--text);margin-bottom:5px}
.empty-sub{font-size:13px;font-weight:700;line-height:1.5}

/* ── DESKTOP ── */
@media(min-width:900px){
  body{background:#EBEBEB}
  .app{padding-bottom:48px}
}
</style>
</head>

   {q:"¿Quién fue el Bota de Oro (máximo goleador) del Mundial de México 1986?",opts:["Diego Maradona","Careca","Gary Lineker","Michel Platini"],a:2}],
  // DÍA 12
  [{q:"¿Qué selección ha clasificado a todos los Mundiales de la historia sin excepción?",opts:["Alemania","Italia","Argentina","Brasil"],a:3},
   {q:"¿Cuántos goles se marcaron en el partido con más goles de la historia mundialista? (Austria 7-5 Suiza, 1954)",opts:["10","11","12","13"],a:2},
   {q:"¿Cuántos Mundiales jugó el portero mexicano Antonio Carbajal, primero en alcanzar esa marca?",opts:["3","4","5","6"],a:2},
   {q:"¿Cuántos goles necesita Mbappé en 2026 para SUPERAR el récord de Klose (16 goles)?",opts:["3","4","5","6"],a:2},
   {q:"¿En cuántos Mundiales terminó Croacia en el podio (top 3) entre 1998 y 2022?",opts:["1","2","3","4"],a:2}],
  // DÍA 13
  [{q:"¿Qué selección ganó la Eurocopa 2024?",opts:["Francia","Alemania","Inglaterra","España"],a:3},

   {q:"¿En qué fase fue eliminada Francia en el Mundial 2002, siendo la defensora del título?",opts:["Cuartos de final","Octavos de final","Semifinales","Fase de grupos"],a:3},

  [{q:"¿Cuántos Mundiales ha ganado Brasil, el país con más títulos mundiales?",opts:["3","4","5","6"],a:2},

// ══════════════════════════════════════════════════════════════
// 🔥  FIREBASE + ESTADO
// ══════════════════════════════════════════════════════════════
let db,auth,currentUser;
let progress={}; // { day_N: { score, answers:[], completed, ts } }

// Quiz state
let quizDay=null,quizQIdx=0,quizAns=[],quizDone=false;
let reviewDay=null;

// ─── helpers de fecha ──
function getTodayNum(){
  const start=new Date(TRIVIA_START+'T00:00:00');
  const now=new Date();
  const s=new Date(start.getFullYear(),start.getMonth(),start.getDate());
  const n=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.round((n-s)/86400000)+1; // 1-based
}
function getDaysLeft(){
  const wc=new Date('2026-06-11T00:00:00');
  return Math.max(0,Math.ceil((wc-new Date())/86400000));
}

// ─── Firebase init ──
function initFirebase(){
  firebase.initializeApp(FIREBASE_CONFIG);
  db=firebase.database(); auth=firebase.auth();
  auth.onAuthStateChanged(u=>{
    if(u){currentUser=u;loadProgress();}
    else{currentUser=null;renderLogin();}
  });
}

async function loadProgress(){
  renderSpinner();
  try{
    const snap=await db.ref(`triviaProgress/${currentUser.uid}`).get();
    progress=snap.exists()?(snap.val()||{}):{};
  }catch(e){progress={};}
  renderLobby();
}

async function saveDay(day,score,answers){
  const data={score,answers,completed:true,ts:Date.now()};
  await db.ref(`triviaProgress/${currentUser.uid}/day_${day}`).set(data);
  progress[`day_${day}`]=data;
}

// ─── stats helpers ──
function getStreak(){
  const today=getTodayNum();
  let s=0;
  for(let d=Math.min(today,14);d>=1;d--){
    if(progress[`day_${d}`]?.completed)s++;else break;
  }
  return s;
}
function getTotalCorrect(){return Object.values(progress).reduce((s,v)=>s+(v.score||0),0);}
function getDaysCompleted(){return Object.values(progress).filter(v=>v.completed).length;}

// ══════════════════════════════════════════════════════════════
// 🎨  RENDER
// ══════════════════════════════════════════════════════════════
const R=()=>document.getElementById('root');
function renderSpinner(){R().innerHTML=`<div class="spinner"><div class="spin">⚽</div><div style="margin-top:10px">Cargando...</div></div>`;}

// ── LOGIN ──
function renderLogin(){
  R().innerHTML=`
  <div class="login-wrap">
    <div style="font-size:44px">⚽</div>
    <h1>Calentando Motores</h1>
    <div class="login-sub">Mundial 2026 · Trivia diaria<br>Usa las credenciales de Tu Polla</div>
    <input class="inp" id="ie" type="email" placeholder="Correo electrónico" autocomplete="email"/>
    <input class="inp" id="ip" type="password" placeholder="Contraseña" autocomplete="current-password"/>
    <div class="err" id="le"></div>
    <button class="btn" id="lb" onclick="doLogin()">Entrar ⚽</button>
  </div>`;
  document.getElementById('ip').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}
async function doLogin(){
  const e=document.getElementById('ie').value.trim();
  const p=document.getElementById('ip').value;
  const err=document.getElementById('le');
  err.textContent='';
  if(!e||!p){err.textContent='Completa todos los campos.';return;}
  const lb=document.getElementById('lb');
  lb.disabled=true;lb.textContent='Entrando...';
  try{await auth.signInWithEmailAndPassword(e,p);}
  catch(ex){err.textContent='Correo o contraseña incorrectos.';lb.disabled=false;lb.textContent='Entrar ⚽';}
}

// ── LOBBY ──
function renderLobby(){
  const today=getTodayNum();
  const dLeft=getDaysLeft();
  const streak=getStreak();
  const totalC=getTotalCorrect();
  const dComp=getDaysCompleted();
  const avg=dComp>0?(totalC/dComp).toFixed(1):'—';

  if(today<1){
    R().innerHTML=`<div class="app">
      ${renderHeader(streak,dLeft)}
      <div class="card"><div class="empty">
        <div class="empty-icon">🔒</div>
        <div class="empty-title">¡Aún no es la hora!</div>
        <div class="empty-sub">La trivia comienza el ${fmtDate(TRIVIA_START)}.<br/>Vuelve pronto, que el Mundial no espera.</div>
      </div></div>
    </div>`;
    return;
  }

  const todayCap=Math.min(today,14);
  const todayDone=progress[`day_${todayCap}`]?.completed;
  const triviaOver=today>14;

  let html=`<div class="app">${renderHeader(streak,dLeft)}`;

  // Stats
  html+=`<div class="stats">
    <div class="stat"><div class="stat-n">${dComp}/14</div><div class="stat-l">Días hechos</div></div>
    <div class="stat"><div class="stat-n">${totalC}</div><div class="stat-l">Correctas</div></div>
    <div class="stat"><div class="stat-n">${avg}</div><div class="stat-l">Prom / día</div></div>
  </div>`;

  // Day grid
  html+=`<div class="card">
    <div class="card-title">Tus 14 días</div>
    <div class="day-grid">`;
  for(let d=1;d<=14;d++){
    const dp=progress[`day_${d}`];
    const done=dp?.completed;
    const isToday=d===todayCap&&!triviaOver;
    const locked=d>todayCap||triviaOver;
    let cls='day-cell ';
    if(done&&isToday)cls+='today-done';
    else if(done)cls+='done';
    else if(isToday)cls+='today';
    else if(locked)cls+='locked';
    const click=done?`onclick="openReview(${d})"`:(isToday?`onclick="startQuiz(${d})"`:'');
    html+=`<div class="${cls}" ${click}>
      <div class="dc-num">${d}</div>
      ${done?`<div class="dc-score">${dp.score}/5</div><div class="dc-icon">${scoreEmoji(dp.score)}</div>`:''}
      ${isToday&&!done?`<div class="dc-icon" style="color:#fff;font-size:9px">HOY</div>`:''}
      ${locked&&!done?`<div class="dc-icon">🔒</div>`:''}
    </div>`;
  }
  html+=`</div></div>`;

  // Today's call to action
  if(!triviaOver){
    const theme=THEMES[todayCap-1];
    if(todayDone){
      const dp=progress[`day_${todayCap}`];
      html+=`<div class="card today-card">
        <div class="today-theme">Día ${todayCap} · Completado</div>
        <div class="today-title">${theme}</div>
        <div style="text-align:center;margin-bottom:14px">
          <span style="font-size:48px;font-weight:900;color:var(--primary)">${dp.score}</span>
          <span style="font-size:20px;color:var(--text-muted);font-weight:700">/5</span>
          <div style="font-size:13px;font-weight:700;color:var(--text-muted);margin-top:2px">${scoreMsg(dp.score)}</div>
        </div>
        <button class="start-btn" style="background:var(--surface-2);color:var(--text-muted);border-color:var(--border);border-bottom-color:var(--border-strong)" onclick="openReview(${todayCap})">Ver respuestas</button>
      </div>`;
    } else {
      html+=`<div class="card today-card">
        <div class="today-theme">Día ${todayCap} de 14</div>
        <div class="today-title">${theme}</div>
        <button class="start-btn" onclick="startQuiz(${todayCap})">Empezar las 5 preguntas 🏆</button>
      </div>`;
    }
  } else {
    html+=`<div class="card"><div class="empty">
      <div class="empty-icon">🏆</div>
      <div class="empty-title">¡Trivia completada!</div>
      <div class="empty-sub">Terminaste el calentamiento. Ahora a ganar la polla.</div>
    </div></div>`;
  }

  html+=`<div style="text-align:center;margin-top:4px;font-size:11px;color:var(--text-dim);font-weight:700">
    ${currentUser.displayName||currentUser.email} · <button onclick="auth.signOut()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;text-decoration:underline">Salir</button>
  </div>`;
  html+=`</div>`;
  R().innerHTML=html;
}

function renderHeader(streak,dLeft){
  return`<div class="header">
    <div class="header-ball">⚽</div>
    <h1>Calentando Motores</h1>
    <div class="header-sub">Mundial 2026 · Trivia diaria</div>
    <div class="badges">
      ${streak>0?`<div class="badge badge-fire">🔥 Racha de ${streak} día${streak!==1?'s':''}</div>`:''}
      <div class="badge badge-wc">⏳ ${dLeft} día${dLeft!==1?'s':''} para el Mundial</div>
    </div>
  </div>`;
}

// ── QUIZ ──
window.startQuiz=function(day){
  quizDay=day; quizQIdx=0; quizAns=[]; quizDone=false;
  renderQuestion();
};

function renderQuestion(){
  const qs=QUESTIONS[quizDay-1];
  const q=qs[quizQIdx];
  const pct=Math.round((quizQIdx/5)*100);
  const letters=['A','B','C','D'];

  const dotsHtml=qs.map((_,i)=>{
    let cls='q-dot';
    if(i<quizQIdx){cls+=quizAns[i]===QUESTIONS[quizDay-1][i].a?' correct':' wrong';}
    else if(i===quizQIdx)cls+=' active';
    return`<div class="${cls}"></div>`;
  }).join('');

  R().innerHTML=`<div class="app">
    <div class="quiz-hdr">
      <button class="back-btn" onclick="renderLobby()">← Volver</button>
      <div class="q-progress">
        <div class="q-progress-label">Pregunta ${quizQIdx+1} de 5</div>
        <div class="q-progress-bar"><div class="q-progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Día ${quizDay} · ${THEMES[quizDay-1]}</div>
      <div class="q-dots">${dotsHtml}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-options" id="opts">
        ${q.opts.map((o,i)=>`
        <button class="opt" id="opt-${i}" onclick="pickAnswer(${i})">
          <span class="opt-letter">${letters[i]}</span>
          <span>${o}</span>
        </button>`).join('')}
      </div>
      <div class="feedback" id="fb">
        <span class="fb-icon" id="fb-icon"></span>
        <span class="fb-msg" id="fb-msg"></span>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">
        ${quizQIdx<4?'Siguiente pregunta →':'Ver resultados 🏆'}
      </button>
    </div>
  </div>`;
}

window.pickAnswer=function(idx){
  // Disable all options
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const q=QUESTIONS[quizDay-1][quizQIdx];
  const correct=idx===q.a;
  quizAns.push(idx);

  // Style buttons
  for(let i=0;i<4;i++){
    const btn=document.getElementById(`opt-${i}`);
    if(i===idx){btn.classList.add(correct?'correct':'wrong');}
    else if(i===q.a){btn.classList.add('correct');}
    else{btn.classList.add('faded');}
  }

  // Feedback
  const fb=document.getElementById('fb');
  const fbIcon=document.getElementById('fb-icon');
  const fbMsg=document.getElementById('fb-msg');
  fb.classList.add('show',correct?'c':'w');
  fbIcon.textContent=correct?'✅':'❌';
  fbMsg.className='fb-msg '+(correct?'c':'w');
  fbMsg.textContent=correct?correctMsg():wrongMsg(q.opts[q.a]);

  // Show next
  document.getElementById('next-btn').classList.add('show');

  // Update dot
  const dots=document.querySelectorAll('.q-dot');
  if(dots[quizQIdx]){
    dots[quizQIdx].classList.remove('active');
    dots[quizQIdx].classList.add(correct?'correct':'wrong');
  }
};

window.nextQuestion=async function(){
  if(quizQIdx<4){quizQIdx++;renderQuestion();}
  else{
    const score=quizAns.filter((a,i)=>a===QUESTIONS[quizDay-1][i].a).length;
    await saveDay(quizDay,score,quizAns);
    renderResults(quizDay,score,quizAns);
  }
};

// ── RESULTS ──
function renderResults(day,score,answers){
  const qs=QUESTIONS[day-1];
  const letters=['A','B','C','D'];
  const emoji=scoreEmoji(score);

  const rowsHtml=qs.map((q,i)=>{
    const ans=answers[i];
    const ok=ans===q.a;
    return`<div class="result-row">
      <div class="result-icon">${ok?'✅':'❌'}</div>
      <div class="result-q">${q.q}</div>
      <div class="result-badge ${ok?'c':'w'}">${ok?q.opts[q.a]:`Resp: ${q.opts[q.a]}`}</div>
    </div>`;
  }).join('');

  R().innerHTML=`<div class="app">
    <div class="card">
      <div class="result-big">
        <div style="font-size:13px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Día ${day} · ${THEMES[day-1]}</div>
        <div class="result-score">${score}</div>
        <div class="result-of">de 5 correctas</div>
        <div style="font-size:28px;margin:6px 0">${emoji}</div>
        <div class="result-label">${scoreMsg(score)}</div>
      </div>
      <div class="result-rows">${rowsHtml}</div>
      <button class="start-btn" onclick="renderLobby()" style="margin-top:14px">← Volver al inicio</button>
    </div>
  </div>`;
}

// ── REVIEW (día ya jugado) ──
window.openReview=function(day){
  reviewDay=day;
  const dp=progress[`day_${day}`];
  if(!dp){renderLobby();return;}
  const qs=QUESTIONS[day-1];
  const answers=dp.answers||[];
  const letters=['A','B','C','D'];

  const qHtml=qs.map((q,i)=>{
    const chosen=answers[i];
    const correct=q.a;
    return`<div class="review-q">
      <div class="review-q-text">${i+1}. ${q.q}</div>
      <div class="review-q-opts">
        ${q.opts.map((o,j)=>{
          let cls='review-opt ';
          if(j===chosen&&j===correct)cls+='c';
          else if(j===chosen&&j!==correct)cls+='w';
          else if(j===correct&&chosen!==correct)cls+='correct-ans';
          else cls+='neutral';
          return`<div class="${cls}">
            <span style="font-weight:900;opacity:.7">${letters[j]}</span>
            <span>${o}</span>
            ${j===correct?'<span style="margin-left:auto;font-size:10px">✓</span>':''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  R().innerHTML=`<div class="app">
    <div class="card">
      <button class="back-btn" onclick="renderLobby()" style="margin-bottom:12px">← Volver</button>
      <div class="today-theme">Día ${day} · ${THEMES[day-1]}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <div style="font-size:28px;font-weight:900;color:var(--primary)">${dp.score}/5</div>
        <div style="font-size:22px">${scoreEmoji(dp.score)}</div>
        <div style="font-size:12px;font-weight:700;color:var(--text-muted)">${scoreMsg(dp.score)}</div>
      </div>
      ${qHtml}
    </div>
  </div>`;
};

// ══════════════════════════════════════════════════════════════
// 🛠️  UTILS
// ══════════════════════════════════════════════════════════════
const CORRECT_MSGS=['¡Correcto! Eres un crack 🔥','¡Exacto! Sabías bien 👏','¡Así se hace! 💪','¡Bien! Eso lo tenías claro ✅','¡Correcto, bien jugado! ⚽'];
const WRONG_MSGS=[m=>`Uy, era "${m}" 😬`,m=>`No era esa, era "${m}" 😅`,m=>`Casi... La respuesta era "${m}" `,m=>`Nope. Correcta: "${m}"`,m=>`Se te fue, era "${m}" 😤`];
function correctMsg(){return CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)];}
function wrongMsg(correct){const fn=WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)];return fn(correct);}
function scoreEmoji(s){if(s===5)return'🏆';if(s>=4)return'🌟';if(s>=3)return'⚽';if(s>=2)return'😬';return'😅';}
function scoreMsg(s){
  if(s===5)return'¡Perfecto! Eres un experto mundialero 🏆';
  if(s===4)return'¡Muy bien! Solo una te escapó';
  if(s===3)return'Bien, pero hay que estudiar más 📚';
  if(s===2)return'Regular, mañana recuperas';
  if(s===1)return'Uy... Toca prepararse un poco más 😅';
  return'0/5 — definitivamente hay que repasar esto 😬';
}
function fmtDate(d){const p=d.split('-');return`${p[2]}/${p[1]}/${p[0]}`;}

// ══════════════════════════════════════════════════════════════
window.addEventListener('load',initFirebase);
</script>
