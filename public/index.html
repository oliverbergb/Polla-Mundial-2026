<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#edf6ff;
 --surface:#FFFFFF;
 --surface-2:#F0F0F0;
 --surface-3:#E5E5E5;
 --border:#E5E5E5;
 --border-soft:#EBEBEB;
 --border-strong:#CACACA;
 --text:#3C3C3C;
 --text-muted:#777777;
 --text-dim:#AFAFAF;
 --primary:#FF9600;
 --primary-hover:#E68600;
 --primary-dark:#CC7700;
 --primary-soft:#FFF3D4;
 --secondary:#1CB0F6;
 --secondary-light:#46C6FF;
 --secondary-soft:#DFF4FF;
 --accent:#CE82FF;
 --accent-light:#A560E8;
 --accent-soft:#F4E4FF;
 --success:#58CC02;
 --success-text:#3D9100;
 --danger:#FF4B4B;
 --danger-soft:#FFD5D5;
 --danger-text:#CC0000;
 --warning:#FF9600;
 --warning-soft:#FFF3D4;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:#edf6ff}
body{background:#edf6ff;background-attachment:fixed;color:var(--text);font-family:'Nunito',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;position:relative}
.app{max-width:680px;margin:0 auto;padding-bottom:80px;position:relative;z-index:1}

/* ── HEADER ── */
.header{position:relative;padding:20px 16px 0;text-align:center;overflow:hidden;background:var(--surface);border-radius:20px;margin:8px 8px 4px;border:2px solid var(--border);box-shadow:0 4px 0 var(--border-strong)}
.header::before{display:none}
.header-bg{display:none}
.header h1{position:relative;font-size:22px;font-weight:900;letter-spacing:-0.3px;margin:6px 0 2px;text-transform:uppercase;font-family:'Nunito',sans-serif;color:var(--text)}
.header-sub{position:relative;color:var(--text-muted);font-size:11px;margin-bottom:4px;font-family:'Nunito',sans-serif;font-weight:700}
.countdown-bar{position:relative;background:var(--primary-soft);border-radius:20px;padding:6px 14px;margin:8px 0;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--primary-dark);border:2px solid var(--primary);font-family:'Nunito',sans-serif}
.tabs-wrap{position:relative;display:flex;justify-content:center}
.tabs-wrap::after{content:"";position:absolute;right:0;top:0;bottom:0;width:30px;background:linear-gradient(to right,transparent,var(--surface));pointer-events:none;z-index:2}
.tabs{display:flex;overflow-x:auto;gap:5px;scrollbar-width:none;position:relative;justify-content:center;flex-wrap:nowrap;width:100%;padding:8px 6px 6px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:7px 14px;font-size:11px;font-weight:800;border:2px solid transparent;border-radius:20px;cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;transition:all .15s}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary-dark);box-shadow:0 3px 0 var(--primary-dark)}
.tab:not(.active){background:var(--surface-2);color:var(--text-muted);border-color:var(--border)}

/* ── MOBILE BOTTOM TABS (Duolingo-style) ── */
@media(max-width:768px){
 .tabs-wrap{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:2px solid var(--border);z-index:50;padding:0;padding-bottom:env(safe-area-inset-bottom,0)}
 .tabs-wrap::after{display:none}
 .tabs{justify-content:space-around;padding:8px 4px;gap:2px;overflow-x:auto}
 .tab{flex:1 1 0;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 4px;font-size:9px;border-radius:12px;text-align:center;line-height:1.1;letter-spacing:0;box-shadow:none!important;border-color:transparent!important;background:transparent!important;color:var(--text-muted)!important}
 .tab.active{background:var(--primary-soft)!important;color:var(--primary)!important;border-color:transparent!important}
 .tab svg{width:20px!important;height:20px!important;margin:0 0 1px 0!important;display:block!important;vertical-align:initial!important}
 .app{padding-bottom:88px!important}
 .fab{bottom:78px!important}
}

/* ── CONTENT ── */
.content{padding:16px 12px}
.card{background:var(--surface);border-radius:18px;padding:16px;margin-bottom:12px;border:2px solid var(--border);box-shadow:0 4px 0 var(--border-strong)}
.match-card{background:var(--surface);border-radius:18px;padding:12px;margin-bottom:10px;position:relative;border:2px solid var(--border);box-shadow:0 4px 0 var(--border-strong);transition:transform .12s ease}
.match-card[onclick]:active{transform:scale(.98)}
.match-meta{font-size:11px;color:var(--text-muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-weight:700}
.match-teams{display:flex;align-items:center;gap:8px}
.team{flex:1;font-weight:800;font-size:13px}
.team.home{text-align:right}
.score-input{width:48px;text-align:center;background:var(--surface-2);border:2px solid var(--border);border-radius:12px;color:var(--text);padding:6px 4px;font-size:15px;font-weight:800;font-family:'Nunito',sans-serif}
.score-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.score-sep{color:var(--text-muted);font-weight:800;flex-shrink:0}
.group-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill{padding:6px 14px;border-radius:20px;border:2px solid var(--border);cursor:pointer;font-size:12px;font-weight:800;transition:all .15s;box-shadow:0 3px 0 var(--border-strong);font-family:'Nunito',sans-serif}
.rank-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:2px solid var(--border-soft)}
.rank-row:last-child{border-bottom:none}

/* ── LOGIN ── */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;background:transparent}
.login-screen h1{font-size:28px;font-weight:900;margin:12px 0 4px;font-family:'Nunito',sans-serif;letter-spacing:-0.3px}
.input{width:100%;max-width:340px;background:var(--surface);border:2px solid var(--border);border-radius:16px;color:var(--text);padding:14px 18px;font-size:16px;margin-bottom:12px;outline:none;font-family:'Nunito',sans-serif;font-weight:700;transition:border-color .15s}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.btn{width:100%;max-width:340px;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:16px;padding:15px;font-size:16px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .1s;letter-spacing:0.2px}
.btn:hover{background:var(--primary-hover)}
.btn:active{border-bottom-width:0;transform:translateY(4px)}
.btn:disabled{background:var(--surface-3);color:var(--text-dim);cursor:not-allowed;border-bottom-color:var(--border-strong)}
.btn-secondary{width:100%;max-width:340px;background:var(--surface);color:var(--text-muted);border:2px solid var(--border);border-bottom:4px solid var(--border-strong);border-radius:16px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:10px;transition:all .1s}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-secondary:active{border-bottom-width:0;transform:translateY(4px)}
.link-btn{background:none;border:none;color:var(--primary);cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;text-decoration:underline;padding:0;font-weight:800}
.remember-row{display:flex;align-items:center;gap:8px;max-width:340px;width:100%;margin-bottom:12px;cursor:pointer}
.remember-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);cursor:pointer}
.remember-row span{font-size:13px;color:var(--text-muted);font-family:'Nunito',sans-serif;font-weight:700}
.error{color:var(--danger);font-size:13px;margin-bottom:10px;max-width:340px;font-weight:800}
.lock-badge{font-size:10px;background:var(--surface-2);color:var(--text-muted);padding:3px 8px;border-radius:20px;margin-left:4px;border:2px solid var(--border);font-weight:800}
.admin-badge{background:var(--secondary);color:#ffffff;font-size:10px;padding:3px 10px;border-radius:20px;margin-left:8px;font-weight:800}

/* ── TOAST ── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--success);color:#ffffff;padding:12px 22px 12px 18px;border-radius:20px;font-weight:800;font-size:14px;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 0 rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;max-width:90vw;overflow:hidden;text-overflow:ellipsis;border:2px solid rgba(255,255,255,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spinner{text-align:center;padding:60px;color:var(--text-muted);font-size:14px;font-weight:700}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}

/* ── SCORES ── */
.score-box{background:var(--surface-2);padding:5px 10px;border-radius:12px;font-size:14px;font-weight:800;min-width:30px;text-align:center;border:2px solid var(--border)}
.score-box.pred{color:var(--text-muted)}
.score-box.result{color:var(--success-text);border-color:var(--success);background:rgba(88,204,2,.1)}
.vs-scores{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:90px}
.pred-row{display:flex;align-items:center;gap:4px}
.pts-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap;border:2px solid transparent}
.pts-3{background:rgba(34,197,94,0.18);color:var(--success-text)}
.pts-1{background:var(--warning-soft);color:var(--warning)}
.pts-2{background:var(--warning-soft);color:var(--warning)}
.pts-0{background:var(--danger-soft);color:var(--danger-text)}

/* ── LIVE PULSE ── */
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block;margin-right:4px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ── DRAG & DROP ── */
.sortable-list{list-style:none}
.sortable-item{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:16px;padding:12px 14px;margin-bottom:8px;cursor:grab;border:2px solid var(--border);box-shadow:0 3px 0 var(--border-strong);transition:border-color .2s;user-select:none;touch-action:none}
.sortable-item.dragging{opacity:.4;cursor:grabbing}
.sortable-item.dragging-live{cursor:grabbing;border-color:var(--primary);box-shadow:0 6px 16px rgba(255,150,0,.25);position:relative;z-index:5}
.sortable-item.drag-over{border-color:var(--primary)}
.pos-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;color:#ffffff}

/* ── ELIM ── */
.elim-locked-info{background:var(--surface);border-radius:18px;padding:24px;text-align:center;color:var(--text-muted);font-size:13px;font-weight:700;border:2px dashed var(--border);margin-bottom:10px}

/* ── RANKING PODIO ── */
.podio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;align-items:end}
.podio-card{border-radius:20px;padding:14px 8px;text-align:center;border:2px solid var(--border);box-shadow:0 4px 0 var(--border-strong)}
.podio-card.p1{background:var(--primary-soft);border-color:var(--primary);box-shadow:0 4px 0 var(--primary-dark);order:2;padding-top:28px}
.podio-card.p2{background:var(--surface);order:1;padding-top:14px}
.podio-card.p3{background:var(--surface);order:3;padding-top:14px}
.podio-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;margin:0 auto 6px}
.podio-medal{font-size:20px;margin-bottom:4px}
.podio-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.podio-pts{font-size:18px;font-weight:900}
@keyframes podioIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.podio-card{animation:podioIn .4s ease both}
.podio-card.p1{animation-delay:.1s}
.podio-card.p2{animation-delay:0s}
.podio-card.p3{animation-delay:.2s}

/* ── FABS ── */
.fab{position:fixed;bottom:20px;width:44px;height:44px;border-radius:50%;color:var(--text-muted);border:2px solid var(--border);border-bottom:4px solid var(--border-strong);font-size:18px;cursor:pointer;z-index:900;display:flex;align-items:center;justify-content:center;background:var(--surface)}
.fab:hover{background:var(--surface-3);color:var(--text);border-color:var(--primary)}
/* FABs se posicionan dentro del .app (max-width:680px centrado).
   calc(50% - 340px + 8px) = borde izquierdo del app + 8px de margen interno.
   calc(50% - 340px + 8px) espejo para la derecha. */
.fab-right{right:max(20px, calc(50% - 340px + 8px))}
.fab-left{left:max(20px, calc(50% - 340px + 8px))}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--surface);border-radius:24px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;padding:24px;border:2px solid var(--border);box-shadow:0 6px 0 var(--border-strong)}
.modal-box h2{font-size:18px;font-weight:900;margin-bottom:16px;text-align:center;font-family:'Nunito',sans-serif}
.rules-section{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border-soft)}
.rules-section:last-of-type{border-bottom:none}
.rules-section h3{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:6px;letter-spacing:.5px}
.rules-section p,.rules-section li{font-size:13px;color:var(--text-muted);line-height:1.65;margin-bottom:3px}
.rules-section ul{padding-left:16px}
.modal-close{width:100%;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:16px;padding:13px;font-size:15px;font-weight:900;cursor:pointer;margin-top:12px;font-family:'Nunito',sans-serif;transition:all .1s}.modal-close:active{border-bottom-width:0;transform:translateY(4px)}

/* ── CARTA CAMPEÓN ── */
.carta-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
.carta-box{background:var(--surface);border-radius:24px;max-width:420px;width:100%;padding:28px 22px 24px;border:3px solid var(--primary);box-shadow:0 6px 0 var(--primary-dark);text-align:center}
.carta-trophy{font-size:52px;margin-bottom:8px;display:block;animation:bounce .8s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}
@keyframes bounce2{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.carta-crown{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px}
.carta-name{font-size:24px;font-weight:900;color:var(--text);margin-bottom:12px}
.carta-divider{border:none;border-top:1px solid var(--border-soft);margin:14px 0}
.carta-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--primary);text-transform:uppercase;margin-bottom:10px}
.carta-text{font-size:13px;color:var(--text);line-height:1.8;text-align:left;max-width:360px;margin:0 auto}
.carta-text p{margin-bottom:10px}
.carta-text p:last-child{margin-bottom:0}
.carta-firma{margin-top:14px;text-align:right;font-size:11px;color:var(--text-muted);font-style:italic}
.carta-close{margin-top:18px;width:100%;background:var(--primary);color:#fff;border:none;border-bottom:4px solid var(--primary-dark);border-radius:16px;padding:12px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .1s}.carta-close:active{border-bottom-width:0;transform:translateY(4px)}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 280px);min-height:280px}
.chat-messages{flex:1;overflow-y:auto;padding:4px 0 8px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.chat-msg{display:flex;flex-direction:column;max-width:82%;gap:2px}
.chat-msg.mine{align-self:flex-end;align-items:flex-end}
.chat-msg.theirs{align-self:flex-start;align-items:flex-start}
.chat-bubble{padding:9px 14px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word;font-weight:700}
.chat-msg.mine .chat-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px;border:2px solid var(--primary-dark)}
.chat-msg.theirs .chat-bubble{background:var(--surface-2);color:var(--text);border-bottom-left-radius:4px;border:2px solid var(--border)}
.chat-meta{font-size:10px;color:var(--text-dim);padding:0 4px}
.chat-input-row{display:flex;gap:8px;padding:10px 0 0;border-top:1px solid var(--border-soft);margin-top:6px}
.chat-input{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:16px;color:var(--text);padding:10px 14px;font-size:14px;outline:none;font-family:'Nunito',sans-serif;font-weight:700;resize:none;min-height:44px;max-height:80px}
.chat-input:focus{border-color:var(--primary)}
.chat-send{background:var(--primary);color:#fff;border:none;border-bottom:3px solid var(--primary-dark);border-radius:16px;padding:10px 16px;font-size:18px;cursor:pointer;flex-shrink:0;line-height:1;transition:all .1s}
.chat-send:hover{background:var(--primary-hover)}
.chat-send:active{border-bottom-width:0;transform:translateY(3px)}
.chat-empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px}

/* ── H2H HISTORY ── */
.h2h-block{padding:8px 0 2px;border-top:1px solid var(--border-soft);margin-top:8px}
.h2h-title{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.h2h-rows{display:none}
.h2h-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-muted);padding:4px 0;border-bottom:1px solid var(--border-soft)}
.h2h-row:last-child{border-bottom:none}
.h2h-score{font-weight:700;color:var(--text);font-size:12px}
.h2h-comp{font-size:10px;color:var(--text-dim);text-align:right;min-width:64px}

/* ── HISTORIAL ── */
.hist-chart{padding:8px 0}
.hist-line{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hist-label{font-size:11px;color:var(--text-muted);min-width:60px;width:auto;max-width:80px;text-align:right;flex-shrink:0}
.hist-bar-wrap{flex:1;background:var(--surface-2);border-radius:4px;height:20px;position:relative;overflow:hidden}
.hist-bar{height:100%;border-radius:4px;background:var(--primary);transition:width .4s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:24px}
.hist-bar-val{font-size:10px;font-weight:700;color:#ffffff}
.hist-pos{font-size:11px;font-weight:700;width:20px;flex-shrink:0}
@media(hover:none)and(pointer:coarse){.polla-dots-btn{display:none!important}}
@media(max-width:768px){.polla-dots-btn{display:none!important}}

/* ── REACTIONS ── */
.reaction-float{position:fixed;background:var(--surface);border:1px solid var(--border-soft);border-radius:16px;padding:6px 10px;display:flex;gap:6px;z-index:2000;box-shadow:0 8px 32px rgba(0,0,0,.7);animation:popIn .15s ease}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.reaction-btn{font-size:22px;background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:10px;transition:transform .12s;line-height:1}
.reaction-btn:hover,.reaction-btn:active{transform:scale(1.35);background:var(--surface-3)}
.pred-reaction-badge{font-size:12px;display:inline-flex;align-items:center;gap:2px;background:var(--surface-3);border:1px solid var(--border-soft);border-radius:8px;padding:1px 5px;cursor:default}

/* ── BRACKET VERTICAL ── */
.bracket-outer{padding:4px 0 8px}
.bracket-section{margin-bottom:20px}
.bracket-phase-hdr{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--primary);text-transform:uppercase;padding:4px 0 10px;border-bottom:1px solid var(--border-soft);margin-bottom:10px}
.bracket-match{background:var(--surface);border:2px solid var(--border);border-radius:18px;margin-bottom:10px;overflow:hidden;transition:border-color .15s,box-shadow .15s;position:relative;box-shadow:0 4px 0 var(--border-strong)}
.bracket-match:not(.locked):hover{border-color:var(--primary);box-shadow:0 4px 0 var(--primary-dark);cursor:pointer}
.bracket-match.locked{cursor:default}
.bm-team{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:13px;font-weight:700;position:relative}
.bm-team.winner{background:rgba(34,197,94,.1);color:var(--success-text)}
.bm-team.loser{color:var(--text-dim)}
.bm-score{margin-left:auto;font-size:14px;font-weight:900;min-width:20px;text-align:right}
.bm-sep{height:1px;background:var(--border-soft);margin:0 12px}
.bm-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px}
.bm-meta{font-size:10px;color:var(--text-dim);padding:4px 12px 7px;display:flex;gap:8px}

/* ── COLLECTIVE BAR ── */
.coll-bar-wrap{margin-top:10px;padding:10px 12px;background:var(--surface-2);border-radius:14px;border:2px solid var(--border)}
.coll-bar-title{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coll-bar-row{display:flex;height:14px;border-radius:6px;overflow:hidden;margin-bottom:5px}
.coll-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;min-width:0;transition:width .3s}
.coll-legend{display:flex;gap:10px;flex-wrap:wrap}
.coll-leg-item{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:3px}
.coll-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

/* ── MISSING TOGGLE ── */
.missing-banner{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface-2);border-radius:8px;cursor:pointer;border:1px solid var(--border-soft);margin-bottom:12px;user-select:none}
.m-toggle{width:34px;height:20px;border-radius:10px;position:relative;flex-shrink:0;transition:background .2s}
.m-toggle::after{content:"";position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s}
.m-toggle.on{background:var(--primary)}
.m-toggle.on::after{transform:translateX(14px)}
.m-toggle.off{background:var(--border)}

/* ── AUTOCOMPLETE ── */
.autocomplete-wrap{position:relative;flex:1}
.autocomplete-input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:14px;outline:none;font-family:'Nunito',sans-serif}
.autocomplete-input:focus{border-color:var(--primary)}
.autocomplete-drop{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border-soft);border-radius:8px;z-index:500;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);margin-top:2px}
.autocomplete-item{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border-soft)}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover,.autocomplete-item.focused{background:var(--surface-3)}

/* ── RANKING BREAKDOWN ── */
.breakdown-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1100;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.breakdown-sheet{background:var(--surface);border-radius:20px;width:100%;max-width:420px;margin:0 auto;max-height:86vh;overflow-y:auto;padding:22px 18px 22px;border:2px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.25);animation:popIn .2s ease}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.breakdown-handle{display:none}
.rb-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border-soft)}
.rb-row:last-child{border-bottom:none}
.rb-label{font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.rb-val{font-size:16px;font-weight:900;color:var(--text)}
.rb-total{font-size:20px;font-weight:900;color:var(--primary)}

/* ── BRAND LOGO ── */
.brand-logo{display:inline-flex;align-items:flex-end;gap:6px;line-height:1;color:var(--primary);user-select:none}
/* margin-bottom negativo compensa el descenso extra del texto grande:
   valor ≈ (fontSize_tu - fontSize_polla) * lineHeight / 2
   sm: (22-16)*1.2/2 ≈ 3.6 → 4px  |  base: (36-26)*1.2/2 = 6px  |  lg: (54-40)*1.2/2 = 8.4 → 8px */
.brand-tu{font-family:'Nunito',sans-serif;font-size:36px;color:var(--primary);font-weight:900;display:inline-block;margin-right:2px;margin-bottom:-6px}
.brand-polla{font-family:'Nunito',sans-serif;font-size:26px;color:var(--primary);letter-spacing:-0.5px;text-transform:uppercase;font-weight:900}
.brand-trophy{width:22px;height:28px;color:var(--primary);flex-shrink:0;margin-bottom:1px;filter:drop-shadow(1px 1px 0 var(--secondary))}
.brand-logo.lg .brand-tu{font-size:54px;margin-bottom:-8px}
.brand-logo.lg .brand-polla{font-size:40px}
.brand-logo.lg .brand-trophy{width:32px;height:40px}
.brand-logo.sm .brand-tu{font-size:22px;margin-bottom:-4px}
.brand-logo.sm .brand-polla{font-size:16px;text-shadow:1px 1px 0 var(--secondary)}
.brand-logo.sm .brand-trophy{width:14px;height:18px}

/* ── DESKTOP ── */
/* =============================================
   MOBILE  (pantallas hasta 899px / celular)
   ============================================= */
@media(max-width:899px){
 .app{padding-bottom:80px}
 .card,.match-card{border-radius:18px}
}

/* =============================================
   DESKTOP  (pantallas desde 900px / web / PC)
   ============================================= */
@media(min-width:900px){
 body{background:#edf6ff}
 .app{
  max-width:none;
  display:grid;
  grid-template-columns:260px 1fr;
  grid-template-rows:auto 1fr;
  min-height:100vh;
  padding-bottom:0;
 }
 .header{
  grid-column:1;
  grid-row:1 / 999;
  margin:12px 0 12px 12px;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  padding:24px 16px 20px;
  min-height:calc(100vh - 24px);
  position:sticky;
  top:12px;
  height:calc(100vh - 24px);
  overflow-y:auto;
 }
 .header::before{border-radius:20px 20px 0 0}
 .tabs-wrap{flex-direction:column;align-items:stretch;margin-top:8px}
 .tabs-wrap::after{display:none}
 .tabs{flex-direction:column;flex-wrap:nowrap;gap:4px;padding:0;justify-content:flex-start;width:100%}
 .tab{border-radius:14px;padding:11px 14px;text-align:left;font-size:13px;border-bottom-width:2px!important}
 .tab.active{border-bottom:3px solid var(--primary-dark)!important;box-shadow:0 3px 0 var(--primary-dark)}
 .content{
  grid-column:2;
  grid-row:1 / 999;
  padding:24px 32px 24px;
  max-width:780px;
  width:100%;
  margin:0 auto;
 }
 .fab{display:none!important}
 .card,.match-card{border-radius:20px}
 .header h1{font-size:18px;margin-top:12px}
 .header-sub{font-size:11px}
 .countdown-bar{font-size:11px}
 .chat-wrap{height:calc(100vh - 80px)!important;}
}

/* ── TUPOLLA CHARACTER ANIMATIONS ── */
#bear-left{transform-box:fill-box;transform-origin:50% 100%;animation:float-a 3.2s ease-in-out infinite}
#bear-mid{transform-box:fill-box;transform-origin:50% 100%;animation:float-b 3.8s ease-in-out infinite .7s}
#bear-right{transform-box:fill-box;transform-origin:50% 100%;animation:float-a 2.9s ease-in-out infinite 1.4s}
#bear-center{transform-box:fill-box;transform-origin:50% 100%;animation:float-big 4.2s ease-in-out infinite .3s}
#hedgehog{transform-box:fill-box;transform-origin:50% 100%;animation:bounce-h 2.6s ease-in-out infinite 1.1s}
@keyframes float-a{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes float-b{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes float-big{0%,100%{transform:translateY(0) scaleX(1)}45%,55%{transform:translateY(-10px) scaleX(1.01)}}
@keyframes bounce-h{0%,100%{transform:translateY(0) scale(1,1)}40%,60%{transform:translateY(-6px) scale(.97,1.03)}}

function calcMatchPoints(pred,res){
 if(!pred||!res)return null;
 const ph=parseInt(pred.h),pa=parseInt(pred.a),rh=parseInt(res.h),ra=parseInt(res.a);
 if(isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra))return null;
 if(res.h===""||res.a==="")return null;
 if(ph===rh&&pa===ra)return 3;
 if(Math.sign(ph-pa)===Math.sign(rh-ra)&&(ph-pa)===(rh-ra))return 2;
 if(Math.sign(ph-pa)===Math.sign(rh-ra))return 1;
 return 0;
}
function calcElimPoints(pred,res){
 if(!pred||!res||!res.winner)return null;
 const ph=parseInt(pred.h),pa=parseInt(pred.a),rh=parseInt(res.h),ra=parseInt(res.a);
 const exactScore=!isNaN(ph)&&!isNaN(pa)&&!isNaN(rh)&&!isNaN(ra)&&ph===rh&&pa===ra;
 if(exactScore&&pred.winner===res.winner)return 3;
 if(exactScore&&pred.winner&&pred.winner!==res.winner)return 2;
 if(pred.winner&&pred.winner===res.winner)return 1;
 if(pred.winner)return 0;
 return null;
}
function calcGroupPredPoints(userOrder,realOrder){
 if(!userOrder||!realOrder)return 0;
 let pts=0;
 for(let i=0;i<4;i++){if(userOrder[i]&&realOrder[i]&&userOrder[i]===realOrder[i])pts+=2;}
 return pts;
}

 const elimPts=MATCHES.filter(m=>m.phase!=="groups").reduce((s,m)=>s+(calcElimPointsR(elim[m.id],allResults[m.id],r)||0),0);
 return matchPts+espPts+grpPts+elimPts;
}
function calcMatchPointsR(pred,res,r){
 if(!pred||!res)return null;
 const ph=parseInt(pred.h),pa=parseInt(pred.a),rh=parseInt(res.h),ra=parseInt(res.a);
 if(isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra))return null;
 if(res.h===""||res.a==="")return null;
 if(ph===rh&&pa===ra)return r.ptsExactoGrupos??3;
 if(Math.sign(ph-pa)===Math.sign(rh-ra)&&(ph-pa)===(rh-ra))return r.ptsGanadorDifGrupos??2;
 if(Math.sign(ph-pa)===Math.sign(rh-ra))return r.ptsSoloGanadorGrupos??1;
 return 0;
}
function calcElimPointsR(pred,res,r){
 if(!pred||!res||!res.winner)return null;
 const ph=parseInt(pred.h),pa=parseInt(pred.a),rh=parseInt(res.h),ra=parseInt(res.a);
 const exactScore=!isNaN(ph)&&!isNaN(pa)&&!isNaN(rh)&&!isNaN(ra)&&ph===rh&&pa===ra;
 if(exactScore&&pred.winner===res.winner)return r.ptsExactoElim??3;
 if(exactScore&&pred.winner&&pred.winner!==res.winner)return r.ptsExactoSinClasif??2;
 if(pred.winner&&pred.winner===res.winner)return r.ptsSoloClasif??1;
 if(pred.winner)return 0;
 return null;
}
function calcGroupPredPointsR(userOrder,realOrder,r){
 if(!userOrder||!realOrder)return 0;
 let pts=0;
 for(let i=0;i<4;i++){if(userOrder[i]&&realOrder[i]&&userOrder[i]===realOrder[i])pts+=(r.ptsPosGrupo??2);}
 return pts;
}

// ─── LOGROS ───────────────────────────────────────────────
// Una jornada = un día calendario. Los días con un solo partido se fusionan
// con el siguiente hasta sumar >=2 partidos. El 3er puesto y la final quedan
// excluidos (partidos sueltos).
function buildJornadas(){
 const elegibles=MATCHES
  .filter(m=>m.phase!=="third"&&m.phase!=="final")
  .slice().sort((a,b)=>a.kickoff<b.kickoff?-1:1);
 const dias=[];
 for(const m of elegibles){
  const ult=dias[dias.length-1];
  if(ult&&ult.date===m.date)ult.matches.push(m);
  else dias.push({date:m.date,matches:[m]});
 }
 const jornadas=[];let acc=null;
 for(const d of dias){
  if(!acc)acc={dates:[d.date],matches:d.matches.slice()};
  else{acc.dates.push(d.date);acc.matches.push(...d.matches);}
  if(acc.matches.length>=2){jornadas.push(acc);acc=null;}
 }
 return jornadas; // un acc final con <2 partidos se descarta
}
// Cuántas jornadas perfectas completó el usuario (no falló ningún pronóstico).
function jornadasPerfectas(u){
 const r=(currentPolla&&currentPolla.rules)||DEFAULT_RULES;
 const preds=u.predictions||{},elim=u.elimPredictions||{};
 let count=0;
 for(const j of buildJornadas()){
  let perfecta=true;
  for(const m of j.matches){
   const res=allResults[m.id];
   const pred=m.phase==="groups"?preds[m.id]:elim[m.id];
   const pts=m.phase==="groups"?calcMatchPointsR(pred,res,r):calcElimPointsR(pred,res,r);
   // null = partido sin resultado aún o sin pronóstico → no cuenta todavía
   if(pts===null||pts===0){perfecta=false;break;}
  }
  if(perfecta)count++;
 }
 return count;
}
// Líder de la semana: permanente. Si en CUALQUIER snapshot del historial el
// usuario estuvo en la posición 1, el logro queda desbloqueado para siempre.
function fueLiderSemana(uid){
 const hist=allResults["rankingHistory"]||{};
 return Object.values(hist).some(snap=>snap&&snap[uid]===1);
}
// Estado de cada logro para un jugador. PLACEHOLDER: el emoji se reemplaza por
// el badge de Franco (mismo tamaño ~22px) cuando esté listo.
function getLogros(uid){
 const u=allUsers[uid]; if(!u)return [];
 const r=(currentPolla&&currentPolla.rules)||DEFAULT_RULES;
 const preds=u.predictions||{},elim=u.elimPredictions||{};
 const tienePred=p=>p&&p.h!==""&&p.h!==undefined;
 const hasAny=Object.values(preds).some(tienePred)||Object.values(elim).some(tienePred);
 let exacto=false;
 MATCHES.forEach(m=>{
  const res=allResults[m.id];
  if(m.phase==="groups"){if(calcMatchPointsR(preds[m.id],res,r)===(r.ptsExactoGrupos??3))exacto=true;}
  else{if(calcElimPointsR(elim[m.id],res,r)===(r.ptsExactoElim??3))exacto=true;}
 });
 const ranked=getRankedUsers();
 const campeon=tournamentEnded()&&ranked.length>0&&ranked[0].uid===uid;
 return [
  {id:"primer",  emoji:"📝", label:"Primer pronóstico", unlocked:hasAny},
  {id:"exacto",  emoji:"🎯", label:"Marcador exacto",   unlocked:exacto},
  {id:"racha",   emoji:"🔥", label:"Racha de 3",        unlocked:getStreak(uid)>=3},
  {id:"perfecta",emoji:"✅", label:"Jornada perfecta",  unlocked:jornadasPerfectas(u)>0},
  {id:"lider",   emoji:"👑", label:"Líder de la semana", unlocked:fueLiderSemana(uid)},
  {id:"campeon", emoji:"🏆", label:"Campeón",           unlocked:campeon},
 ];
}

function getRankedUsers(){
 return Object.entries(allUsers)

}

function getStreak(uid){
 const preds=(allUsers[uid]||{}).predictions||{};
 const played=MATCHES.filter(m=>m.phase==="groups"&&allResults[m.id]?.h!==undefined&&allResults[m.id]?.h!=="");
 let streak=0;
 for(let i=played.length-1;i>=0;i--){
 const pts=calcMatchPoints(preds[played[i].id],allResults[played[i].id]);
 if(pts>=1)streak++;else break;
 }
 return streak;
}

// ─── COUNTDOWN ────────────────────────────────────────────
function getCountdown(){
 const now=new Date(),target=new Date(TOURNAMENT_LOCKOUT);
 const diff=target-now;
 if(diff<=0)return null;
 const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
 return`${d}d ${h}h ${m}m ${s}s`;
}

function localMatchTime(kickoff){
 const d=new Date(kickoff);
 const timeStr=d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",hour12:false});
 const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
 const city=tz.split("/").pop().replace(/_/g," ");
 return`${timeStr} ${city}`;
}

 const d=new Date(kickoff);
 return d.toLocaleDateString([],{day:"numeric",month:"short"});
}

window.doJoinFromLanding=async function(){
 const code=(document.getElementById("landingCode").value||"").trim().toUpperCase();
 const errEl=document.getElementById("landingError");
 if(code.length<4){errEl.textContent="Escribe el código completo.";return;}
 errEl.textContent="";
 const inp=document.getElementById("landingCode");
 inp.disabled=true;
 try{
 const snap=await db.ref("pollas").orderByChild("code").equalTo(code).get();
 if(!snap.exists()){errEl.textContent="Código no encontrado. Verifica e intenta de nuevo.";inp.disabled=false;return;}
 if(currentUser){await joinPollaByCode(code);return;}
 // Skip name pick — auth handler will restore name from DB if user exists.
 pendingPollaAction=async()=>{await joinPollaByCode(code);};
 renderAuthScreen("");
 }catch(e){errEl.textContent="Error al conectar. Intenta de nuevo.";inp.disabled=false;}
};

window.doGoogleAuth=async function(){
 try{
 const provider=new firebase.auth.GoogleAuthProvider();
 await auth.signInWithPopup(provider);
 }catch(e){
 if(e.code==="auth/popup-closed-by-user"||e.code==="auth/cancelled-popup-request")return;
 if(e.code==="auth/unauthorized-domain"){showToast("Dominio no autorizado. Agrégalo en Firebase → Authentication → Authorized domains.","#ef4444",5000);return;}
 showToast("Error con Google: "+(e.message||e.code),"#ef4444",4000);
 }
};

window.doEmailAuth=async function(){
 const email=(document.getElementById("authEmail").value||"").trim();
 const pass=document.getElementById("authPass").value||"";
 const errEl=document.getElementById("authError"),btn=document.getElementById("authBtn");
 if(!email||!email.includes("@")){errEl.textContent="Escribe un email válido.";return;}
 if(pass.length<6){errEl.textContent="La contraseña debe tener al menos 6 caracteres.";return;}
 btn.disabled=true;btn.textContent="Entrando...";
 try{
 // First try sign in
 try{await auth.signInWithEmailAndPassword(email,pass);}
 catch(le){
 // If account doesn't exist or credentials invalid, try creating account
 const shouldTryCreate=[
 "auth/user-not-found",
 "auth/invalid-credential",
 "auth/invalid-login-credentials"
 ].includes(le.code);
 if(shouldTryCreate){
 try{
 await auth.createUserWithEmailAndPassword(email,pass);
 }catch(ce){
 // If create fails with email-already-in-use, the password was just wrong
 if(ce.code==="auth/email-already-in-use"){
 errEl.textContent="Contraseña incorrecta.";
 btn.disabled=false;btn.textContent="Entrar →";
 return;
 }
 throw ce;
 }
 }else{throw le;}
 }
 }catch(e){
 const msg={
 "auth/wrong-password":"Contraseña incorrecta.",
 "auth/invalid-credential":"Contraseña incorrecta.",
 "auth/invalid-login-credentials":"Contraseña incorrecta.",
 "auth/user-not-found":"Correo electrónico no registrado.",
 "auth/invalid-email":"El correo electrónico no es válido.",
 "auth/too-many-requests":"Demasiados intentos fallidos. Espera unos minutos.",
 "auth/network-request-failed":"Sin conexión. Verifica tu red.",
 "auth/email-already-in-use":"Ese correo ya está registrado.",
 "auth/user-disabled":"Esta cuenta ha sido deshabilitada."
 }[e.code]||`Error al iniciar sesión (${e.code}).`;
 errEl.textContent=msg;btn.disabled=false;btn.textContent="Entrar →";
 }
};

function generateCode(){
 const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
 return Array.from({length:6},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
}

window.doCrearPolla=async function(){
 const nombre=(document.getElementById("pollaName").value||"").trim();
 const errEl=document.getElementById("crearError");
 if(!nombre||nombre.length<2){errEl.textContent="Escribe un nombre para la polla.";return;}
 // Capture rules now, while the form is still in the DOM. Deferred creation
 // (after sign-in) runs once the form is gone, which would otherwise reset
 // every toggle/score selection back to its default.
 const rules=readPollaRules();
 if(!currentUser){
 sessionStorage.setItem("pendingPollaName",nombre);
 // Queue the polla creation; auth handler will run it after sign-in.
 // If the user already has a stored profile, they'll skip the name picker entirely.
 pendingPollaAction=async()=>{await _doCreatePolla(sessionStorage.getItem("pendingPollaName")||nombre,rules);sessionStorage.removeItem("pendingPollaName");};
 renderAuthScreen("");
 return;
 }
 await _doCreatePolla(nombre,rules);
};

function readPollaRules(){
 const getRuleVal=id=>{const v=parseInt(document.getElementById(`rule_${id}`)?.value);return isNaN(v)||v<1?Math.max(1,DEFAULT_RULES[id]||1):v;};
 return {
 ptsExactoGrupos:getRuleVal("ptsExactoGrupos"),ptsGanadorDifGrupos:getRuleVal("ptsGanadorDifGrupos"),
 ptsSoloGanadorGrupos:getRuleVal("ptsSoloGanadorGrupos"),ptsExactoElim:getRuleVal("ptsExactoElim"),
 ptsExactoSinClasif:getRuleVal("ptsExactoSinClasif"),ptsSoloClasif:getRuleVal("ptsSoloClasif"),
 ptsPosGrupo:getRuleVal("ptsPosGrupo"),
 incluirPartidosGrupos:document.getElementById("incluirPartidosGrupos")?.checked!==false,
 incluirClasificacion:document.getElementById("incluirClasificacion")?.checked!==false,
 incluirEliminatoria:true,
 espCampeon:getRuleVal("espCampeon"),espBotaOro:getRuleVal("espBotaOro"),
 espGuanteOro:getRuleVal("espGuanteOro"),espMejorJugador:getRuleVal("espMejorJugador"),
 incluirEspeciales:document.getElementById("incluirEspeciales")?.checked!==false,
 };
}

async function _doCreatePolla(nombre,rules){
 sessionStorage.removeItem("pendingPollaName");
 if(!rules)rules=readPollaRules();
 const code=generateCode();
 const pollaId=db.ref("pollas").push().key;
 const pollaData={nombre,rules,code,creadorUid:currentUser.uid,creadaEn:Date.now(),
 participantes:{[currentUser.uid]:{name:currentUser.name,joinedAt:Date.now(),predictions:{},especiales:{},groupPredictions:{},elimPredictions:{}}}};
 await db.ref(`pollas/${pollaId}`).set(pollaData);
 currentPollaId=pollaId;currentPolla=pollaData;myPollas[pollaId]=pollaData;
 track('polla_created',{includeEspeciales:rules.incluirEspeciales,includeElim:rules.incluirEliminatoria});
 renderInvite(pollaId,nombre,code);
}

const _prevScores={};
let _gnTimer=null;

function showGoalNotif(match,newH,newA){
 const pred=myPredictions[match.id];
 const hasPred=pred&&pred.h!==undefined&&pred.h!==""&&pred.a!==undefined&&pred.a!=="";

 // calc points with new score
 const pts=hasPred?calcMatchPoints(pred,{h:String(newH),a:String(newA)}):null;
 const isExact=pts===3;

 const bar=document.getElementById("goal-notif");
 const home=match.home,away=match.away;
 document.getElementById("gn-icon").textContent=isExact?"":"";
 document.getElementById("gn-score").textContent=`${home} ${newH} — ${newA} ${away}`;

 const ptsEl=document.getElementById("gn-pts");
 if(hasPred){
 if(isExact){
 ptsEl.textContent=`¡Pronosticaste ${pred.h}-${pred.a} · 3 puntos asegurados!`;
 ptsEl.style.color="#4ade80";
 bar.style.background="#1a3a1a";
 bar.style.borderBottomColor="#22c55e66";
 // shake after slide in
 setTimeout(()=>{
 bar.style.transform="translateX(-50%) translateY(0) translateX(-4px)";
 setTimeout(()=>{bar.style.transform="translateX(-50%) translateY(0) translateX(4px)";
 setTimeout(()=>{bar.style.transform="translateX(-50%) translateY(0)";},80);},80);
 },380);
 } else {
 ptsEl.textContent=`Pronosticaste ${pred.h}-${pred.a} · ahora tendrías ${pts} pt${pts!==1?"s":""}`;
 ptsEl.style.color="var(--primary-hover)";
 bar.style.background="var(--bg)";
 bar.style.borderBottomColor="var(--primary)44";
 }
 } else {
 ptsEl.textContent="";
 bar.style.background="var(--bg)";
 bar.style.borderBottomColor="var(--primary)44";
 }

 clearTimeout(_gnTimer);
 bar.style.transform="translateX(-50%) translateY(-100%)";
 void bar.offsetWidth;
 bar.style.transform="translateX(-50%) translateY(0)";
 _gnTimer=setTimeout(()=>{bar.style.transform="translateX(-50%) translateY(-100%)";},isExact?5000:4000);
}

// ─── MASTER POLLING ───────────────────────────────────────
function iniciarMasterPolling(){
 // Escuchar scores globales en tiempo real — todos los clientes
 db.ref("liveScores").on("value",snap=>{
 const live=snap.val()||{};
 Object.entries(live).forEach(([id,score])=>{
 if(id==="_lastUpdated")return;
 const numId=parseInt(id);
 if(!allResults[numId])allResults[numId]={};
 allResults[numId].h=score.h;
 allResults[numId].a=score.a;
 });
 render();
 });

 // Solo un cliente hace polling a BallDontLie
 async function turnoMaster(){
 const masterRef=db.ref("pollingMaster");
 try{
 const snap=await masterRef.get();
 const master=snap.val();
 const now=Date.now();
 const sinMaster=!master||(now-master.lastSeen)>180000;
 const soyCandidato=sinMaster||master.uid===currentUser.uid;
 if(soyCandidato){
 await masterRef.set({uid:currentUser.uid,lastSeen:now});
 await fetchLiveResults();
 }
 }catch(e){console.log("Master check error:",e);}
 }

 turnoMaster();
 setInterval(turnoMaster,120000);
}

async function fetchLiveResults(){
 try{
 const res=await fetch("https://api.balldontlie.io/fifa/worldcup/v1/matches?seasons[]=2026&per_page=200",{headers:{Authorization:BALLDONTLIE_KEY}});
 const data=await res.json();
 if(!data.data)return;
 const updates={};
 for(const m of data.data){
 if(m.status!=="completed"&&m.status!=="in_progress")continue;
 if(m.home_score==null||m.away_score==null)continue;
 const match=MATCHES.find(x=>x.home.toLowerCase().includes((m.home_team?.name||"").toLowerCase().split(" ")[0]));
 if(!match)continue;
 const newH=m.home_score,newA=m.away_score;
 const prev=_prevScores[match.id];
 if(prev!==undefined&&(prev.h!==newH||prev.a!==newA)){
 showGoalNotif(match,newH,newA);
 }
 _prevScores[match.id]={h:newH,a:newA};
 updates[`liveScores/${match.id}`]={h:String(newH),a:String(newA)};
 }
 updates["liveScores/_lastUpdated"]=Date.now();
 if(Object.keys(updates).length>1)await db.ref().update(updates);
 }catch(e){console.log("API error:",e);}
}

function calcGroupTable(g){
 const teams=GROUPS[g],stats={};
 teams.forEach(t=>{stats[t]={pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0};});
 MATCHES.filter(m=>m.group===g).forEach(m=>{
 const res=allResults[m.id];if(!res||res.h===""||res.h===undefined)return;
 const rh=parseInt(res.h),ra=parseInt(res.a);if(isNaN(rh)||isNaN(ra))return;
 const h=m.home,a=m.away;if(!stats[h]||!stats[a])return;
 stats[h].pj++;stats[a].pj++;stats[h].gf+=rh;stats[h].gc+=ra;stats[a].gf+=ra;stats[a].gc+=rh;
 if(rh>ra){stats[h].pts+=3;stats[h].pg++;stats[a].pp++;}
 else if(rh<ra){stats[a].pts+=3;stats[a].pg++;stats[h].pp++;}
 else{stats[h].pts+=1;stats[a].pts+=1;stats[h].pe++;stats[a].pe++;}
 });
 return Object.entries(stats).map(([t,s])=>({team:t,...s,dif:s.gf-s.gc})).sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);
}

function initDragDrop(){
 const g=currentGroup;if(!GROUPS[g])return;
 const list=document.getElementById(`sortable-${g}`);if(!list)return;
 let dragEl=null;

 function items(){return[...list.children];}
 function updateBadges(){items().forEach((item,i)=>{const b=item.querySelector('.pos-num');if(b){b.style.background=POS_COLORS[i];b.textContent=POS_LABELS[i];}});}
 function saveOrder(){saveGroupPred(g,items().map(li=>li.dataset.team));}

 // FLIP: reorder the DOM, then slide the displaced items from their old
 // positions to the new ones so the movement is visible (fast). The actively
 // held element (exclude) is not animated — it simply takes its new slot.
 function reorder(mutate,exclude){
  const before=new Map();
  items().forEach(el=>before.set(el,el.getBoundingClientRect().top));
  mutate();
  items().forEach(el=>{
   if(el===exclude)return;
   const oldTop=before.get(el);if(oldTop==null)return;
   const dy=oldTop-el.getBoundingClientRect().top;
   if(!dy)return;
   el.style.transition="none";
   el.style.transform=`translateY(${dy}px)`;
   requestAnimationFrame(()=>{
    el.style.transition="transform .16s ease";
    el.style.transform="";
   });
  });
  updateBadges();
 }

 // ── Desktop (HTML5 drag) ──
 list.addEventListener("dragstart",e=>{
  dragEl=e.target.closest(".sortable-item");
  if(!dragEl)return;
  try{e.dataTransfer.effectAllowed="move";}catch(_){}
  requestAnimationFrame(()=>{if(dragEl)dragEl.classList.add("dragging-live");});
 });
 list.addEventListener("dragend",()=>{
  if(dragEl)dragEl.classList.remove("dragging-live");
  dragEl=null;updateBadges();saveOrder();
 });
 list.addEventListener("dragover",e=>{
  e.preventDefault();
  if(!dragEl)return;
  const over=e.target.closest(".sortable-item");
  if(!over||over===dragEl)return;
  const rect=over.getBoundingClientRect();
  const insertAfter=e.clientY>rect.top+rect.height/2;
  const ref=insertAfter?over.nextSibling:over;
  if(ref===dragEl||ref===dragEl.nextSibling)return;
  reorder(()=>list.insertBefore(dragEl,ref),dragEl);
 });
 list.addEventListener("drop",e=>{e.preventDefault();});

 // ── Touch (clone follows finger, list reorders live) ──
 let tEl=null,tClone=null,tTimer=null,tActive=false;
 list.addEventListener("touchstart",e=>{
  const item=e.target.closest(".sortable-item");
  if(!item)return;
  tEl=item;tActive=false;
  tTimer=setTimeout(()=>{
   tActive=true;
   document.body.style.overflow="hidden";
   if(navigator.vibrate)navigator.vibrate(40);
   tEl.classList.add("dragging-live");
   tEl.style.opacity="0.35";
   tClone=tEl.cloneNode(true);
   tClone.style.cssText=`position:fixed;opacity:.9;pointer-events:none;z-index:999;width:${tEl.offsetWidth}px;background:var(--surface);border-radius:16px;padding:12px 14px;box-shadow:0 8px 24px rgba(0,0,0,0.35);border:2px solid var(--primary);transition:none;`;
   document.body.appendChild(tClone);
  },300);
 },{passive:true});
 list.addEventListener("touchmove",e=>{
  if(!tEl){clearTimeout(tTimer);return;}
  if(!tActive){clearTimeout(tTimer);tEl=null;return;}
  e.preventDefault();
  const t=e.touches[0];
  tClone.style.left=(t.clientX-tEl.offsetWidth/2)+"px";
  tClone.style.top=(t.clientY-30)+"px";
  const els=document.elementsFromPoint(t.clientX,t.clientY);
  const over=els.find(el=>el.classList?.contains("sortable-item")&&el!==tEl);
  if(over){
   const rect=over.getBoundingClientRect();
   const insertAfter=t.clientY>rect.top+rect.height/2;
   const ref=insertAfter?over.nextSibling:over;
   if(ref!==tEl&&ref!==tEl.nextSibling)reorder(()=>list.insertBefore(tEl,ref),tEl);
  }
 },{passive:false});
 function endTouch(){
  clearTimeout(tTimer);
  document.body.style.overflow="";
  if(tClone){tClone.remove();tClone=null;}
  if(tEl){tEl.classList.remove("dragging-live");tEl.style.opacity="";}
  if(tActive){updateBadges();saveOrder();}
  tEl=null;tActive=false;
 }
 list.addEventListener("touchend",endTouch);
 list.addEventListener("touchcancel",endTouch);
}

async function fetchH2H(home,away){
 const key=`${home}_${away}`;
 if(key in h2hCache)return h2hCache[key];
 try{
 const q=encodeURIComponent(`${home} ${away}`);
 const res=await fetch(`https://api.balldontlie.io/fifa/worldcup/v1/matches?per_page=10`,{headers:{Authorization:BALLDONTLIE_KEY}});
 if(!res.ok){h2hCache[key]=null;return null;}
 const data=await res.json();
 if(!data.data){h2hCache[key]=null;return null;}
 const hn=home.toLowerCase(),an=away.toLowerCase();
 const matches=data.data.filter(m=>{
 const ht=(m.home_team?.name||"").toLowerCase(),at=(m.away_team?.name||"").toLowerCase();
 return(ht.includes(hn.split(" ")[0])||hn.includes(ht.split(" ")[0]))&&
 (at.includes(an.split(" ")[0])||an.includes(at.split(" ")[0]));
 }).slice(0,3);
 h2hCache[key]=matches.length?matches:null;
 return h2hCache[key];
 }catch(e){h2hCache[key]=null;return null;}
}

 const hs=m.home_score??"-",as=m.away_score??"-";
 const date=m.date?new Date(m.date).toLocaleDateString([],{month:"short",year:"numeric"}):"";
 const comp=m.competition||"";

window.scoreInputKey=function(e,matchId,side){
 // Tab / Enter: same nav.
 // - From home: go to away of same match
 // - From away: go to home of next unlocked match
 // (Enter only completes the "match" once both home and away are filled — but
 //  navigating sequentially achieves the same since the user has to type away first.)
 if(e.key==="Tab"||e.key==="Enter"){
  e.preventDefault();
  savePred(matchId,side,e.target.value);
  if(side==="h"){
   // Move to away input of same match
   const next=document.querySelector(`.score-input[data-match="${matchId}"][data-side="a"]`);
   if(next){next.focus();next.select();}
  }else{
   // Move to home input of next unlocked match
   const allInputs=[...document.querySelectorAll('.score-input[data-side="h"]')];
   const cur=allInputs.findIndex(inp=>parseInt(inp.dataset.match)===matchId);
   const next=allInputs[cur+1];
   if(next){next.focus();next.select();}
  }
 }
};

 }
 function scoreColor(pts){
 if(pts===3) return '#4ade80';

// Returns a relative countdown string from now to a target date (Date or ISO).
// Format scales with proximity: "2d 14h" / "4h 12m" / "12m" / "ahora".
// Uses native Date so respects the user's local timezone.
function matchCountdown(kickoffIso){
 const now=new Date(),target=new Date(kickoffIso);
 const diff=target-now;
 if(diff<=0)return "ahora";
 const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
 if(d>=1)return `${d}d ${h}h`;
 if(h>=1)return `${h}h ${m}m`;
 if(m>=1)return `${m}m`;
 return "<1m";
}
function matchCountdownUrgency(kickoffIso){
 const diff=new Date(kickoffIso)-new Date();
 if(diff<=0)return "live";
 if(diff<3600000)return "high";   // <1h
 if(diff<21600000)return "med";   // <6h
 return "low";
}
// Update only the countdown pills in-place, no full re-render
function updateMatchCountdowns(){
 document.querySelectorAll(".match-countdown-pill").forEach(el=>{
  const k=el.dataset.kickoff;
  if(!k)return;
  const newTxt=matchCountdown(k);
  if(el.textContent.replace(/^Cierra en /,'')!==newTxt){
   el.textContent="Cierra en "+newTxt;
  }
  const u=matchCountdownUrgency(k);
  el.dataset.urgency=u;
  if(u==="high"){el.style.background="#fee2e2";el.style.color="#991b1b";el.style.borderColor="#ef4444";}
  else if(u==="med"){el.style.background="#fff3d4";el.style.color="#cc7700";el.style.borderColor="#f59e0b";}
  else{el.style.background="#fff8e1";el.style.color="#b45309";el.style.borderColor="#facc15";}
 });
}
// Periodic refresh — every 60s — for countdowns
setInterval(updateMatchCountdowns,60000);
// Periodic state re-render (every 60s) to flip locked/live/finished states when crossing kickoff
let _stateRefreshTick=0;
setInterval(()=>{
 _stateRefreshTick++;
 // Only re-render visible tab if we're on partidos (mis_pronos), live games need refreshing
 if(currentPollaId && currentTab==="mis_pronos"){
  const hasLive=MATCHES.some(isLive);
  // Refresh every cycle if there's a live match, otherwise every 2 mins to catch transitions
  if(hasLive || _stateRefreshTick%2===0)renderTab();
 }
},60000);

};

// ─── POLLI · RESUMEN DE JORNADA ──────────────────────────
// Generates a daily recap message per local date if there are finished matches that day.
// Stored at /pollas/{id}/polliRecaps/{YYYY-MM-DD} so it's generated only once.
async function maybeGenerateDailyRecaps(){
 if(!currentPollaId||!currentUser)return;
 // Find all distinct local-date strings of matches that have results
 const finishedMatches=MATCHES.filter(m=>{
  const r=allResults[m.id];
  return r&&r.h!==undefined&&r.h!=="";
 });
 if(!finishedMatches.length)return;
 // Group matches by local kickoff date (yyyy-mm-dd)
 const byDate={};
 finishedMatches.forEach(m=>{
  const d=new Date(m.kickoff);
  const ymd=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  if(!byDate[ymd])byDate[ymd]=[];
  byDate[ymd].push(m);
 });
 // Check what recaps already exist
 const existSnap=await db.ref(`pollas/${currentPollaId}/polliRecaps`).once("value");
 const existing=existSnap.val()||{};
 // For each finished day, if no recap exists yet AND that day's matches are all done OR
 // the day is in the past (yesterday or earlier), generate it
 const now=new Date();
 const today=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
 for(const ymd in byDate){
  if(existing[ymd])continue;
  // Only generate if it's a past day (not today, to let games of the day complete)
  if(ymd>=today)continue;
  const dayMatches=byDate[ymd];
  const recap=buildPolliRecap(ymd,dayMatches);
  if(!recap)continue;
  // Mark as generated and push to chat (race-safe: use transaction)
  try{
   const setOk=await db.ref(`pollas/${currentPollaId}/polliRecaps/${ymd}`).transaction(cur=>{
    if(cur)return; // abort if someone else already wrote it
    return {ts:Date.now(),by:currentUser.uid};
   });
   if(setOk.committed){
    await db.ref(`pollas/${currentPollaId}/chat`).push({
     uid:POLLI_UID,name:POLLI_NAME,html:recap.html,ts:recap.ts
    });
   }
  }catch(_){}
 }
}

function buildPolliRecap(ymd,dayMatches){
 const r=(currentPolla&&currentPolla.rules)||DEFAULT_RULES;
 // Compute points each user earned from these specific matches
 const userDayPts={};
 const userBestSingle={};
 Object.entries(allUsers).forEach(([uid,u])=>{
  let total=0,best={pts:-1,match:null};
  dayMatches.forEach(m=>{
   const pred=m.phase==="groups"?(u.predictions||{})[m.id]:(u.elimPredictions||{})[m.id];
   const res=allResults[m.id];
   if(!pred||!res)return;
   const pts=m.phase==="groups"?calcMatchPointsR(pred,res,r):calcElimPointsR(pred,res,r);
   if(pts===null||pts===undefined)return;
   total+=pts;
   if(pts>best.pts)best={pts,match:m,pred};
  });
  userDayPts[uid]={name:u.name,total,best};
 });
 const entries=Object.values(userDayPts).filter(e=>e.total>0||e.best.pts>0);
 if(!entries.length)return null;
 // Top earner of the day
 const top=[...entries].sort((a,b)=>b.total-a.total)[0];
 // Best single prediction (highest pts in one match)
 const bestSingleAll=[...entries].sort((a,b)=>(b.best.pts||0)-(a.best.pts||0))[0];
 // Format date (e.g. "12 de junio")
 const [y,mo,d]=ymd.split("-").map(Number);
 const monthNames=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
 const dateLabel=`${d} de ${monthNames[mo-1]}`;
 // Build HTML (uses safe text — names come from db but escape just in case)
 const esc=escHtml;
 const lines=[];
 lines.push(`<div style="font-size:11px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">🗞️ Resumen · ${dateLabel}</div>`);
 lines.push(`<div style="font-size:12px;color:var(--text);margin-bottom:10px">Cerró otra jornada del Mundial. Esto fue lo más destacado:</div>`);
 if(top&&top.total>0){
  lines.push(`<div style="margin:6px 0"><strong style="color:var(--primary)">🔝 Mejor del día:</strong> ${esc(top.name)} con <strong>+${top.total} pts</strong></div>`);
 }
 if(bestSingleAll&&bestSingleAll.best&&bestSingleAll.best.match){
  const bm=bestSingleAll.best.match;
  const bp=bestSingleAll.best.pred;
  const bres=allResults[bm.id];
  lines.push(`<div style="margin:6px 0"><strong style="color:var(--primary)">🎯 Pronóstico del día:</strong> ${esc(bestSingleAll.name)} clavó ${bp.h}-${bp.a} en ${flag(bm.home)} ${esc(bm.home)} vs ${esc(bm.away)} ${flag(bm.away)} (real ${bres.h}-${bres.a}) → <strong>+${bestSingleAll.best.pts}</strong></div>`);
 }
 // Racha activa — show top streak holder if any
 const streakRanking=Object.keys(allUsers).map(uid=>({uid,name:allUsers[uid].name,streak:getStreak(uid)})).filter(x=>x.streak>=3).sort((a,b)=>b.streak-a.streak);
 if(streakRanking.length){
  const top=streakRanking[0];
  lines.push(`<div style="margin:6px 0"><strong style="color:var(--primary)">🔥 Racha activa:</strong> ${esc(top.name)} con ${top.streak} partidos seguidos con puntos</div>`);
 }
 return {html:lines.join(""),ts:Date.parse(`${ymd}T23:59:00`)};
}

  const preds=u.predictions||{},esp=u.especiales||{},grp=u.groupPredictions||{},elim=u.elimPredictions||{};
  const adminEsp=allResults["especiales"]||{},realGrp=allResults["groupOrder"]||{};
  const matchPts=MATCHES.filter(m=>m.phase==="groups").reduce((s,m)=>s+(calcMatchPointsR(preds[m.id],allResults[m.id],r)||0),0);

  },0):0;

 const toggle=`<div style="display:flex;gap:6px;margin-bottom:14px;background:var(--surface-2);border:2px solid var(--border);border-radius:14px;padding:4px">
  <button onclick="setPartidosView('grupos')" style="flex:1;padding:9px 8px;border-radius:10px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;border:none;background:${partidosView==='grupos'?'var(--primary)':'transparent'};color:${partidosView==='grupos'?'#fff':'var(--text-muted)'};${partidosView==='grupos'?'box-shadow:0 2px 0 var(--primary-dark)':''};transition:all .15s">${tpIcon('partidos',13,partidosView==='grupos'?'#fff':'var(--text-muted)')} Fase de grupos</button>
  <button onclick="setPartidosView('eliminatorias')" style="flex:1;padding:9px 8px;border-radius:10px;font-size:12px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;border:none;background:${partidosView==='eliminatorias'?'var(--primary)':'transparent'};color:${partidosView==='eliminatorias'?'#fff':'var(--text-muted)'};${partidosView==='eliminatorias'?'box-shadow:0 2px 0 var(--primary-dark)':''};transition:all .15s">${tpIcon('eliminatoria',13,partidosView==='eliminatorias'?'#fff':'var(--text-muted)')} Eliminatorias</button>
 </div>`;
 return toggle+(partidosView==='eliminatorias'?renderEliminatorias():renderMisPronos());
}
window.setPartidosView=function(v){partidosView=v;renderTab();};

// ─── RENDER TAB (with reactions init) ────────────────────
function renderTab(){
 const c=document.getElementById("tab-content");if(!c)return;
 const fns={grupos:renderGrupos,mis_pronos:renderPartidos,especiales:renderEspeciales,ranking:renderRanking,chat:renderChat};
 const _r=(currentPolla&&currentPolla.rules)||{};
 if(currentTab==="grupos"&&_r.incluirClasificacion===false)currentTab="mis_pronos";
 if(currentTab==="especiales"&&_r.incluirEspeciales===false)currentTab="mis_pronos";
 c.innerHTML=(fns[currentTab]||renderPartidos)();
 if(currentTab==="grupos")initDragDrop();
 if(currentTab==="chat")initChat();
 if(currentTab==="mis_pronos"&&partidosView==="grupos")setTimeout(initReactionListeners,50);
}

window.addEventListener("load",initFirebase);
</script>
