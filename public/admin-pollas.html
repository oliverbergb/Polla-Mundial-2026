function scoreTier(pred,res){
 if(!pred||!res)return null;
 const ph=parseInt(pred.h),pa=parseInt(pred.a),rh=parseInt(res.h),ra=parseInt(res.a);
 if(isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra))return null;
 if(res.h===""||res.a==="")return null;
 if(ph===rh&&pa===ra)return 3;
 if(Math.sign(ph-pa)===Math.sign(rh-ra)&&(ph-pa)===(rh-ra))return 2;
 if(Math.sign(ph-pa)===Math.sign(rh-ra))return 1;
 return 0;
}
function calcMatchPointsR(pred,res,r){
 const t=scoreTier(pred,res);if(t===null)return null;
 if(t===3)return r.ptsExactoGrupos??3;
 if(t===2)return r.ptsGanadorDifGrupos??2;
 if(t===1)return r.ptsSoloGanadorGrupos??1;
 return 0;
}
function calcElimPointsR(pred,res,r){
 const t=scoreTier(pred,res);if(t===null)return null;
 if(t===3)return r.ptsExactoElim??3;
 if(t===2)return r.ptsExactoSinClasif??2;
 if(t===1)return r.ptsSoloClasif??1;
 return 0;
}
function calcGroupPredPointsR(userOrder,realOrder,r){
 if(!userOrder||!realOrder)return 0;
 let pts=0;
 for(let i=0;i<4;i++){if(userOrder[i]&&realOrder[i]&&userOrder[i]===realOrder[i])pts+=(r.ptsPosGrupo??2);}
 return pts;
}
function calcGroupTable(g,results){
 const teams=GROUPS[g],stats={};
 teams.forEach(t=>{stats[t]={pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0};});
 MATCHES.filter(m=>m.group===g).forEach(m=>{
  const res=results[m.id];if(!res||res.h===""||res.h===undefined)return;
  const rh=parseInt(res.h),ra=parseInt(res.a);if(isNaN(rh)||isNaN(ra))return;
  const h=m.home,a=m.away;if(!stats[h]||!stats[a])return;
  stats[h].pj++;stats[a].pj++;stats[h].gf+=rh;stats[h].gc+=ra;stats[a].gf+=ra;stats[a].gc+=rh;
  if(rh>ra){stats[h].pts+=3;stats[h].pg++;stats[a].pp++;}
  else if(rh<ra){stats[a].pts+=3;stats[a].pg++;stats[h].pp++;}
  else{stats[h].pts+=1;stats[a].pts+=1;stats[h].pe++;stats[a].pe++;}
 });
 return Object.entries(stats).map(([t,s])=>({team:t,...s,dif:s.gf-s.gc})).sort((a,b)=>b.pts-a.pts||b.dif-a.dif||b.gf-a.gf);
}
function officialGroupOrder(g,results,world){
 const ov=(world.groupOverride||{})[g];
 if(ov&&ov.length)return ov;
 const gm=MATCHES.filter(m=>m.group===g);
 if(!gm.length)return undefined;
 const done=gm.every(m=>{const res=results[m.id];return res&&res.h!==""&&res.h!=null&&res.a!==""&&res.a!=null;});
 if(!done)return undefined;
 return calcGroupTable(g,results).map(r=>r.team);
}
/* totalPoints — réplica EXACTA de la app (mismas inclusiones/exclusiones) */
function totalPoints(u,rules,results,world){
 const r=rules||DEFAULT_RULES;
 const preds=u.predictions||{},esp=u.especiales||{},grp=u.groupPredictions||{},elim=u.elimPredictions||{};
 const matchPts=MATCHES.filter(m=>m.phase==="groups").reduce((s,m)=>s+(calcMatchPointsR(preds[m.id],results[m.id],r)||0),0);
 const adminEsp=world.especiales||{};
 const espPts=r.incluirEspeciales?ESPECIALES_FIELDS.reduce((s,f)=>{
  const ruleKey="esp"+f.id.charAt(0).toUpperCase()+f.id.slice(1);
  const pts=r[ruleKey]??f.pts;
  const p=(esp[f.id]||"").trim().toLowerCase(),rv=(adminEsp[f.id]||"").trim().toLowerCase();
  return s+(p&&rv&&p===rv?pts:0);
 },0):0;
 const grpPts=r.incluirClasificacion!==false?Object.keys(GROUPS).reduce((s,g)=>s+calcGroupPredPointsR(grp[g]||GROUPS[g],officialGroupOrder(g,results,world),r),0):0;
 const elimPts=MATCHES.filter(m=>m.phase!=="groups").reduce((s,m)=>s+(calcElimPointsR(elim[m.id],results[m.id],r)||0),0);
 return matchPts+espPts+grpPts+elimPts;
}

const activeParts=p=>Object.entries(p.participantes||{}).filter(([,u])=>u&&!u.left);

// Resultados efectivos de una polla = marcadores globales (/liveScores) como base,
// y encima lo que tenga la polla en su propio /results (por si hubo carga manual).
// Esto replica cómo la app fusiona ambos en memoria (liveScores manda en h/a).
function pollaResults(p){
 const out={};
 // 1) base: marcadores globales del Mundial
 Object.keys(LIVE||{}).forEach(k=>{
  if(k==="_lastUpdated")return;
  const v=LIVE[k]; if(!v)return;
  out[k]={h:v.h,a:v.a,status:v.status||null};
 });
 // 2) overlay: results propios de la polla (sin metadatos)
 const r=p.results||{};
 Object.keys(r).forEach(k=>{
  if(k==="phase_locks"||k==="rankingHistory")return;
  const v=r[k]; if(v&&v.h!=null&&v.h!=="") out[k]={...(out[k]||{}),...v};
 });
 return out;
}
function pollaRules(p){ return p.rules||DEFAULT_RULES; }

function buildLeaderboard(){
 LEADER=[];
 Object.entries(POLLAS).forEach(([id,p])=>{
  const rules=pollaRules(p), results=pollaResults(p);
  activeParts(p).forEach(([uid,u])=>{
   LEADER.push({
    pollaId:id, pollaName:p.nombre||"(sin nombre)", code:p.code||"—",
    uid, name:u.name||"¿?", email:u.email||"",
    pts:totalPoints(u,rules,results,WORLD),
    isCreator:uid===p.creadorUid,
    members:activeParts(p).length
   });
  });
 });
 LEADER.sort((a,b)=>b.pts-a.pts||(a.name||"").localeCompare(b.name||""));
}

function _ago(ts){
 if(!ts)return"sin registro";
 const s=Math.floor((Date.now()-ts)/1000);
 if(s<60)return"hace instantes";
 const m=Math.floor(s/60); if(m<60)return"hace "+m+" min";
 const h=Math.floor(m/60); if(h<24)return"hace "+h+" h";
 const d=Math.floor(h/24); if(d<30)return"hace "+d+(d>1?" días":" día");
 const mo=Math.floor(d/30); return"hace "+mo+(mo>1?" meses":" mes");
}
function renderPresence(){
 const panel=document.getElementById("presencePanel");
 if(!panel)return;
 const seen={},list=[];
 Object.entries(POLLAS).forEach(([pid,p])=>{
  if(!(p.nombre||"").toLowerCase().includes("rica polla"))return;
  Object.entries(p.participantes||{}).forEach(([uid,u])=>{
   if(!u||u.left||seen[uid])return; seen[uid]=1;
   list.push({uid,name:u.name||"¿?",pid});
  });
 });
 if(!list.length){panel.innerHTML="";return;}
 list.forEach(r=>{const st=STATUS[r.uid]||{};r.online=!!st.online;r.lastSeen=st.lastSeen||0;});
 list.sort((a,b)=>(b.online-a.online)||(b.lastSeen-a.lastSeen)||a.name.localeCompare(b.name));
 const on=list.filter(r=>r.online).length;
 let h=`<h3>🟢 Rica Polla — en línea (${on}/${list.length})</h3><div class="presence">`;
 list.forEach(r=>{
  const dot=r.online?'#22c55e':'#5a4a32';
  const txt=r.online?'en línea':_ago(r.lastSeen);
  h+=`<div class="pres-row"><span class="pres-dot" style="background:${dot}"></span><span class="pres-name">${esc(r.name)}</span><span class="pres-when">${esc(txt)}</span><button class="ghost" style="padding:2px 10px;font-size:12px" onclick="spy('${r.pid}','${r.uid}')">Ver</button></div>`;
 });
 panel.innerHTML=h+`</div>`;
}

// Guarda (como ADMIN) el pronóstico de un jugador. isGroups=true => predictions, false => elimPredictions.
window.adminSavePred=async function(matchId,isGroups){

 const hEl=document.getElementById(`sp_${matchId}_h`), aEl=document.getElementById(`sp_${matchId}_a`);
 if(!hEl||!aEl)return;
 const clean=v=>{v=(v||"").replace(/[^0-9]/g,"").slice(0,2); if(v!==""&&parseInt(v,10)>99)v="99"; return v;};
 const h=clean(hEl.value), a=clean(aEl.value);
 const node=isGroups?"predictions":"elimPredictions";
 const path=`pollas/${_spyId}/participantes/${_spyUid}/${node}/${matchId}`;
 try{
  await db.ref(path).update({h,a});
  // Reflejar en memoria para recalcular puntos y re-render sin recargar
  const u=(POLLAS[_spyId].participantes||{})[_spyUid]||{};
  u[node]=u[node]||{}; u[node][matchId]={...(u[node][matchId]||{}),h,a};
  buildLeaderboard();
  spyToast(`Guardado: ${h===""?"–":h}-${a===""?"–":a} ✓`);
  renderSpy();
 }catch(e){ spyToast("No se pudo guardar: "+(e.code||e.message||"error"),true); }
};

window.adminSaveGroup=async function(g){

 for(let i=0;i<teams.length;i++){

 }

 const path=`pollas/${_spyId}/participantes/${_spyUid}/groupPredictions/${g}`;
 try{
  await db.ref(path).set(order);
  const u=(POLLAS[_spyId].participantes||{})[_spyUid]||{};
  u.groupPredictions=u.groupPredictions||{}; u.groupPredictions[g]=order;
  buildLeaderboard();
  spyToast(`Grupo ${g} guardado ✓`);
  renderSpy();
 }catch(e){ spyToast("No se pudo guardar: "+(e.code||e.message||"error"),true); }
};
window.copyCode=function(ev,code){ ev.stopPropagation(); navigator.clipboard&&navigator.clipboard.writeText(code); const el=ev.currentTarget; const old=el.textContent; el.textContent="¡copiado!"; setTimeout(()=>{el.textContent=old;},900); };

function renderSpy(){
 const p=POLLAS[_spyId]; if(!p){closeSpy();return;}
 const rules=pollaRules(p),results=pollaResults(p);
 const parts=activeParts(p).sort((a,b)=>totalPoints(b[1],rules,results,WORLD)-totalPoints(a[1],rules,results,WORLD));
 let h=_spyEdit
  ? `<div class="note" style="background:#fdecea;border-color:#f5b5ad;color:#b71c1c">✏️ Modo edición. Lo que cambies aquí se guarda <b>en vivo</b> en el pronóstico del jugador y recalcula sus puntos. Úsalo solo para corregir errores.</div>`
  : `<div class="note">👁 Modo lectura. Estás viendo <b>${esc(p.nombre||"")}</b> sin entrar como participante — nadie en la polla se entera.</div>`;
 h+=`<h3 style="margin-top:4px">${esc(p.nombre||"(sin nombre)")} <code style="cursor:pointer;font-size:13px" title="Copiar código" onclick="copyCode(event,'${esc(p.code||'')}')">${esc(p.code||"—")}</code></h3>`;
 h+=`<div style="margin-bottom:12px">`;
 parts.forEach(([uid,u])=>{ h+=`<span class="chip ${uid===_spyUid?'active':''}" onclick="spyPick('${uid}')">${esc(u.name||"¿?")} · ${totalPoints(u,rules,results,WORLD)}pts</span>`; });
 h+=`</div>`;

 if(!_spyUid){ h+=`<p style="color:#b8a98f">Toca un jugador para ver todos sus pronósticos (pasados y futuros).</p>`; document.getElementById("overlayPanel").innerHTML=h; return; }
 const u=(p.participantes||{})[_spyUid]||{};
 const preds=u.predictions||{},elim=u.elimPredictions||{},grp=u.groupPredictions||{},esp=u.especiales||{};
 h+=`<div style="font-size:14px;font-weight:800;margin-bottom:6px">${esc(u.name||"¿?")} — <span style="color:#de3d27">${totalPoints(u,rules,results,WORLD)} pts</span><button onclick="toggleSpyEdit()" style="float:right;font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid ${_spyEdit?'#de3d27':'#caa18f'};background:${_spyEdit?'#de3d27':'#fff'};color:${_spyEdit?'#fff':'#8a3b2e'};cursor:pointer;font-weight:700">${_spyEdit?'✓ Salir de edición':'✏️ Editar pronósticos'}</button></div>`;

 const tierClass=t=>t===3?"p3":t===2?"p2":t===1?"p1":t===0?"p0":"pf";
 function _apElimWinner(m){
  const res=results[m.id]; if(!res)return null;
  const H=_apResolve(m.home),A=_apResolve(m.away);
  if(res.winner&&(res.winner===H||res.winner===A))return res.winner;
  const h=res.h,a=res.a; if(h==null||h===""||a==null||a==="")return res.winner||null;
  const nh=parseInt(h),na=parseInt(a); if(isNaN(nh)||isNaN(na))return res.winner||null;
  if(nh>na)return H; if(na>nh)return A;
  const ph=parseInt(res.pensH),pa=parseInt(res.pensA);
  if(!isNaN(ph)&&!isNaN(pa)){ if(ph>pa)return H; if(pa>ph)return A; }
  return res.winner||null;
 }
 function _apResolve(name){
  if(!name)return name;
  let mm=String(name).match(/^\s*(\d)\s*\u00ba\s*Grupo\s*([A-L])\s*$/i);
  if(mm){const o=officialGroupOrder(mm[2].toUpperCase(),results,WORLD);return (o&&o[parseInt(mm[1])-1])||name;}
  mm=String(name).match(/^G(\d+)$/);
  if(mm){const pm=MATCHES.find(x=>x.id===parseInt(mm[1]));const w=pm?_apElimWinner(pm):null;return w||name;}
  mm=String(name).match(/Ganador\s*SF\s*([12])/i);
  if(mm){const pm=MATCHES.find(x=>x.id===(mm[1]==="1"?101:102));const w=pm?_apElimWinner(pm):null;return w||name;}
  mm=String(name).match(/Perdedor\s*SF\s*([12])/i);
  if(mm){const pm=MATCHES.find(x=>x.id===(mm[1]==="1"?101:102));if(pm){const w=_apElimWinner(pm);if(w){const H=_apResolve(pm.home),A=_apResolve(pm.away);return w===H?A:(w===A?H:name);}}return name;}
  return name;
 }
 function matchRow(m){
  const isGroups=m.phase==="groups";
  const pred=isGroups?preds[m.id]:elim[m.id];
  const res=results[m.id];
  const t=scoreTier(pred,res);
  const pts=isGroups?calcMatchPointsR(pred,res,rules):calcElimPointsR(pred,res,rules);
  const future=new Date()<new Date(m.kickoff);
  const _hn=isGroups?m.home:_apResolve(m.home);
  const _an=isGroups?m.away:_apResolve(m.away);
  const teams=`${flag(_hn)} ${esc(_hn)} <span style="color:#6b5c44">vs</span> ${flag(_an)} ${esc(_an)}`;
  const predTxt=(pred&&pred.h!=null&&pred.h!=="")?`${sc(pred.h)}-${sc(pred.a)}`:'<span style="color:#6b5c44">sin pronóstico</span>';
  const resTxt=(res&&res.h!=null&&res.h!=="")?`res ${sc(res.h)}-${sc(res.a)}`:(future?`<span style="color:#6b5c44">${m.date} ${m.time}</span>`:'<span style="color:#6b5c44">—</span>');
  const ptsTxt=(pts==null)?"":`<span class="${tierClass(t)}">+${pts}</span>`;
  const subline=_spyEdit
   ? `<div style="display:flex;gap:5px;align-items:center;margin-top:4px">`
     +`<input id="sp_${m.id}_h" value="${(pred&&pred.h!=null&&pred.h!=="")?esc(pred.h):''}" inputmode="numeric" maxlength="2" placeholder="–" style="width:36px;text-align:center;padding:4px;border:1px solid #caa18f;border-radius:6px;font-weight:700"/>`
     +`<span style="color:#6b5c44">-</span>`
     +`<input id="sp_${m.id}_a" value="${(pred&&pred.a!=null&&pred.a!=="")?esc(pred.a):''}" inputmode="numeric" maxlength="2" placeholder="–" style="width:36px;text-align:center;padding:4px;border:1px solid #caa18f;border-radius:6px;font-weight:700"/>`
     +`<button onclick="adminSavePred('${m.id}',${isGroups})" style="font-size:11px;padding:4px 10px;border:none;border-radius:6px;background:#de3d27;color:#fff;cursor:pointer;font-weight:700">Guardar</button>`
     +`</div>`
   : `<div style="font-size:11px;color:#6b5c44">pronóstico: ${predTxt}</div>`;
  return `<div class="mrow"><div class="teams">${teams}${subline}</div><div class="res">${resTxt}</div><div class="ppts">${ptsTxt}</div></div>`;
 }

 // Partidos por fase, ordenados por kickoff
 ["groups","r32","r16","qf","sf","third","final"].forEach(ph=>{
  const ms=MATCHES.filter(m=>m.phase===ph).sort((a,b)=>a.kickoff<b.kickoff?-1:1);
  if(!ms.length)return;
  h+=`<div class="phaseh">${PHASE_LABEL[ph]}</div>`;
  ms.forEach(m=>{ h+=matchRow(m); });
 });

 // Clasificación de grupos
 if(rules.incluirClasificacion!==false){
  h+=`<div class="phaseh">Clasificación de grupos (pronóstico de orden)</div>`;
  Object.keys(GROUPS).forEach(g=>{
   const teams=GROUPS[g]||[];
   const userOrder=grp[g]||GROUPS[g], realOrder=officialGroupOrder(g,results,WORLD);
   const gp=calcGroupPredPointsR(userOrder,realOrder,rules);
   const ordTxt=userOrder?userOrder.map((t,i)=>`${i+1}.${esc(t)}`).join("  "):'<span style="color:#6b5c44">sin orden</span>';
   let grpBody;
   if(_spyEdit){
    const base=(userOrder&&userOrder.length===teams.length)?userOrder:teams;
    let sel="";
    for(let i=0;i<teams.length;i++){
     const cur=base[i]||teams[i];
     sel+=`<div style="display:flex;align-items:center;gap:4px;margin:2px 0">`
        +`<span style="width:16px;color:#6b5c44;font-size:11px">${i+1}.</span>`
        +`<select id="grp_${g}_${i}" style="flex:1;padding:3px;border:1px solid #caa18f;border-radius:6px;font-size:12px">`
        +teams.map(t=>`<option value="${esc(t)}" ${t===cur?'selected':''}>${esc(t)}</option>`).join("")
        +`</select></div>`;
    }
    grpBody=`<div style="margin-top:5px">${sel}<button onclick="adminSaveGroup('${g}')" style="font-size:11px;padding:4px 10px;border:none;border-radius:6px;background:#de3d27;color:#fff;cursor:pointer;font-weight:700;margin-top:3px">Guardar orden</button></div>`;
   } else {
    grpBody=`<div style="font-size:11px;color:#6b5c44">${ordTxt}</div>`;
   }
   h+=`<div class="mrow"><div class="teams"><b>Grupo ${g}</b>${grpBody}</div><div class="res">${realOrder?'definido':'<span style="color:#6b5c44">pendiente</span>'}</div><div class="ppts"><span class="${gp>0?'p3':'p0'}">+${gp}</span></div></div>`;
  });
 }

 // Especiales
 if(rules.incluirEspeciales){
  const adminEsp=WORLD.especiales||{};
  h+=`<div class="phaseh">Especiales</div>`;
  ESPECIALES_FIELDS.forEach(f=>{
   const ruleKey="esp"+f.id.charAt(0).toUpperCase()+f.id.slice(1);
   const maxp=rules[ruleKey]??f.pts;
   const pv=(esp[f.id]||"").trim(), rv=(adminEsp[f.id]||"").trim();
   const hit=pv&&rv&&pv.toLowerCase()===rv.toLowerCase();
   h+=`<div class="mrow"><div class="teams"><b>${f.label}</b><div style="font-size:11px;color:#6b5c44">eligió: ${pv?esc(pv):'<span style="color:#6b5c44">—</span>'}${rv?' · real: '+esc(rv):''}</div></div><div class="res"></div><div class="ppts"><span class="${hit?'p3':'p0'}">+${hit?maxp:0}</span></div></div>`;
  });
 }

 document.getElementById("overlayPanel").innerHTML=h;
}
</script>
</body>
</html>
